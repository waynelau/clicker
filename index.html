<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHONK CLICKER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,0,80,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,80,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) scale(0); }
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #ff0050;
      text-shadow:
        0 0 20px rgba(255,0,80,0.5),
        0 0 60px rgba(255,0,80,0.3),
        0 0 100px rgba(255,0,80,0.1);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      z-index: 2;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255,0,80,0.5), 0 0 60px rgba(255,0,80,0.3); }
      50% { text-shadow: 0 0 30px rgba(255,0,80,0.8), 0 0 80px rgba(255,0,80,0.5), 0 0 120px rgba(255,0,80,0.2); }
    }

    .counter {
      font-size: clamp(3rem, 15vw, 10rem);
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.3),
        0 0 60px rgba(255,0,80,0.2);
      z-index: 2;
      transition: transform 0.1s ease;
      line-height: 1;
      margin-bottom: 2rem;
    }

    .counter.bump {
      transform: scale(1.15);
    }

    .subtitle {
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      z-index: 2;
    }

    .btn-wrapper {
      z-index: 2;
      position: relative;
    }

    .click-btn {
      position: relative;
      width: clamp(160px, 40vw, 220px);
      height: clamp(160px, 40vw, 220px);
      border-radius: 50%;
      border: 3px solid #ff0050;
      background: radial-gradient(circle at 35% 35%, #2a0015, #150008);
      color: #ff0050;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
      cursor: pointer;
      outline: none;
      transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.08s ease;
      box-shadow:
        0 0 30px rgba(255,0,80,0.3),
        0 0 60px rgba(255,0,80,0.1),
        inset 0 0 30px rgba(255,0,80,0.1);
      -webkit-tap-highlight-color: transparent;
    }

    .click-btn::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,0,80,0.2);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .click-btn::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(255,0,80,0.1);
      animation: ringPulse 2s ease-in-out infinite 0.5s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.4; }
    }

    .click-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 50px rgba(255,0,80,0.5),
        0 0 100px rgba(255,0,80,0.2),
        inset 0 0 40px rgba(255,0,80,0.2);
      border-color: #ff3377;
    }

    .click-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 0 80px rgba(255,0,80,0.8),
        0 0 150px rgba(255,0,80,0.3),
        inset 0 0 60px rgba(255,0,80,0.3);
      border-color: #ff5599;
      background: radial-gradient(circle at 35% 35%, #3d001f, #1f000d);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 80, 0.06);
      pointer-events: none;
      z-index: 10;
      animation: flashOut 0.15s ease-out forwards;
    }

    @keyframes flashOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .click-text {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: #ff0050;
      pointer-events: none;
      z-index: 5;
      animation: clickTextUp 0.7s ease-out forwards;
      text-shadow: 0 0 10px rgba(255,0,80,0.8);
    }

    @keyframes clickTextUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    .streak-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #ff0050, #ff3377, #ff0050);
      z-index: 10;
      transition: width 0.1s ease;
      box-shadow: 0 0 15px rgba(255,0,80,0.8);
    }

    .streak-label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: #ff0050;
      letter-spacing: 0.2em;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px rgba(255,0,80,0.5);
    }

    .streak-label.visible {
      opacity: 1;
    }

    .milestone {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      color: #ff0050;
      z-index: 20;
      pointer-events: none;
      text-shadow: 0 0 40px rgba(255,0,80,0.8), 0 0 80px rgba(255,0,80,0.4);
      animation: milestoneIn 1.2s ease-out forwards;
    }

    @keyframes milestoneIn {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.3) rotate(3deg); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) rotate(0deg); opacity: 0; }
    }

    .combo-text {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 4vw, 2rem);
      font-weight: 900;
      color: #ffaa00;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      text-shadow: 0 0 20px rgba(255,170,0,0.8);
    }

    .combo-text.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="vignette"></div>
  <div class="particles" id="particles"></div>

  <div class="subtitle">TOTAL CLICKS</div>
  <div class="counter" id="counter">0</div>
  <div class="title">PHONK CLICKER</div>

  <div class="btn-wrapper">
    <button class="click-btn" id="clickBtn">HIT IT</button>
  </div>

  <div class="streak-bar" id="streakBar" style="width: 0%"></div>
  <div class="streak-label" id="streakLabel"></div>
  <div class="combo-text" id="comboText"></div>

  <script>
    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('clickBtn');
    const particlesEl = document.getElementById('particles');
    const streakBar = document.getElementById('streakBar');
    const streakLabel = document.getElementById('streakLabel');
    const comboText = document.getElementById('comboText');

    let count = parseInt(localStorage.getItem('phonkClicks') || '0');
    let streak = 0;
    let streakTimer = null;
    let lastClickTime = 0;
    let audioCtx = null;

    counterEl.textContent = count.toLocaleString();

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playPhonkSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      // Deep 808 bass kick
      const bassOsc = audioCtx.createOscillator();
      const bassGain = audioCtx.createGain();
      bassOsc.type = 'sine';
      bassOsc.frequency.setValueAtTime(120, now);
      bassOsc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
      bassGain.gain.setValueAtTime(0.7, now);
      bassGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      bassOsc.connect(bassGain);
      bassGain.connect(audioCtx.destination);
      bassOsc.start(now);
      bassOsc.stop(now + 0.35);

      // Distorted click transient
      const clickOsc = audioCtx.createOscillator();
      const clickGain = audioCtx.createGain();
      const distortion = audioCtx.createWaveShaper();
      clickOsc.type = 'square';
      clickOsc.frequency.setValueAtTime(800, now);
      clickOsc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
      clickGain.gain.setValueAtTime(0.3, now);
      clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
      }
      distortion.curve = curve;
      clickOsc.connect(distortion);
      distortion.connect(clickGain);
      clickGain.connect(audioCtx.destination);
      clickOsc.start(now);
      clickOsc.stop(now + 0.08);

      // Hi-hat noise
      const bufferSize = audioCtx.sampleRate * 0.06;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * 0.3;
      }
      const noise = audioCtx.createBufferSource();
      const noiseGain = audioCtx.createGain();
      const hipass = audioCtx.createBiquadFilter();
      hipass.type = 'highpass';
      hipass.frequency.value = 7000;
      noise.buffer = noiseBuffer;
      noiseGain.gain.setValueAtTime(0.2, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      noise.connect(hipass);
      hipass.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);

      // Pitch up with streak for more hype
      if (streak > 5) {
        const hypeOsc = audioCtx.createOscillator();
        const hypeGain = audioCtx.createGain();
        hypeOsc.type = 'sawtooth';
        const pitch = 200 + Math.min(streak * 15, 400);
        hypeOsc.frequency.setValueAtTime(pitch, now);
        hypeOsc.frequency.exponentialRampToValueAtTime(pitch * 0.5, now + 0.12);
        hypeGain.gain.setValueAtTime(0.08, now);
        hypeGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        hypeOsc.connect(hypeGain);
        hypeGain.connect(audioCtx.destination);
        hypeOsc.start(now);
        hypeOsc.stop(now + 0.12);
      }
    }

    function spawnParticles(x, y) {
      const colors = ['#ff0050', '#ff3377', '#ff5599', '#ffaa00', '#ffffff'];
      const count = 6 + Math.min(streak, 15);
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 8 + 3;
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5);
        const dist = Math.random() * 80 + 30;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = (x + Math.cos(angle) * dist) + 'px';
        p.style.top = (y + Math.sin(angle) * dist) + 'px';
        p.style.boxShadow = `0 0 ${size * 2}px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 0.5 + 0.4) + 's';
        particlesEl.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    function showClickText(x, y) {
      const texts = ['+1', 'BOOM', 'FIRE', 'YO!', 'HARD', 'BANG', 'SHEESH', 'W', 'LET\'S GO'];
      const el = document.createElement('div');
      el.className = 'click-text';
      el.textContent = streak > 3 ? texts[Math.floor(Math.random() * texts.length)] : '+1';
      el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = (y - 30) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function showFlash() {
      const flash = document.createElement('div');
      flash.className = 'flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 150);
    }

    function showMilestone(text) {
      const el = document.createElement('div');
      el.className = 'milestone';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function updateStreak() {
      const now = Date.now();
      const timeSinceLast = now - lastClickTime;
      lastClickTime = now;

      if (timeSinceLast < 500) {
        streak++;
      } else if (timeSinceLast < 1000) {
        streak = Math.max(1, streak);
      } else {
        streak = 1;
      }

      const pct = Math.min(streak / 20, 1) * 100;
      streakBar.style.width = pct + '%';

      if (streak >= 3) {
        streakLabel.textContent = `${streak}x STREAK`;
        streakLabel.classList.add('visible');
      }

      if (streak >= 5) {
        comboText.textContent = streak >= 20 ? 'UNSTOPPABLE' : streak >= 15 ? 'GODLIKE' : streak >= 10 ? 'ON FIRE' : 'COMBO';
        comboText.classList.add('visible');
        comboText.style.transform = `translateX(-50%) scale(${1 + streak * 0.02})`;
      }

      clearTimeout(streakTimer);
      streakTimer = setTimeout(() => {
        streak = 0;
        streakBar.style.width = '0%';
        streakLabel.classList.remove('visible');
        comboText.classList.remove('visible');
      }, 1200);
    }

    function handleClick(e) {
      initAudio();
      count++;
      localStorage.setItem('phonkClicks', count.toString());
      counterEl.textContent = count.toLocaleString();

      // Bump animation
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 100);

      // Effects
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      updateStreak();
      playPhonkSound();
      spawnParticles(cx, cy);
      showClickText(cx, cy);
      showFlash();

      // Milestones
      const milestones = { 10: 'WARMING UP!', 25: 'GETTING HYPE!', 50: 'HALFWAY LIT!', 100: '100 HITS!', 250: 'BEAST MODE!', 500: 'LEGENDARY!', 1000: 'PHONK GOD!' };
      if (milestones[count]) {
        showMilestone(milestones[count]);
      }

      // Hue shift at milestones
      if (count % 100 === 0) {
        document.body.style.transition = 'background 0.5s';
        document.body.style.background = '#120008';
        setTimeout(() => { document.body.style.background = '#0a0a0a'; }, 500);
      }
    }

    btn.addEventListener('click', handleClick);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        btn.click();
      }
    });
  </script>
</body>
</html>
