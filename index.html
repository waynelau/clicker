<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHONK CLICKER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --bg-alt: #120008;
      --grid-color: rgba(255,0,80,0.03);
      --vignette: rgba(0,0,0,0.8);
      --accent: #ff0050;
      --accent-light: #ff3377;
      --accent-lighter: #ff5599;
      --accent-glow-s: rgba(255,0,80,0.5);
      --accent-glow-m: rgba(255,0,80,0.3);
      --accent-glow-w: rgba(255,0,80,0.1);
      --btn-bg: radial-gradient(circle at 35% 35%, #2a0015, #150008);
      --btn-bg-active: radial-gradient(circle at 35% 35%, #3d001f, #1f000d);
      --btn-ring: rgba(255,0,80,0.2);
      --btn-ring-far: rgba(255,0,80,0.1);
      --text: #fff;
      --text-dim: rgba(255,255,255,0.3);
      --flash: rgba(255,0,80,0.06);
      --combo: #ffaa00;
      --combo-glow: rgba(255,170,0,0.8);
      --modal-bg: rgba(0,0,0,0.8);
      --modal-box: #141414;
      --modal-border: rgba(255,0,80,0.3);
      --reset-color: rgba(255,255,255,0.3);
      --reset-border: rgba(255,255,255,0.1);
      --cancel-color: rgba(255,255,255,0.6);
      --cancel-border: rgba(255,255,255,0.2);
    }

    .light {
      --bg: #f5f0f2;
      --bg-alt: #ffe8ee;
      --grid-color: rgba(255,0,80,0.06);
      --vignette: rgba(255,255,255,0.6);
      --accent: #e0003e;
      --accent-light: #ff1a5e;
      --accent-lighter: #ff4d80;
      --accent-glow-s: rgba(224,0,62,0.35);
      --accent-glow-m: rgba(224,0,62,0.2);
      --accent-glow-w: rgba(224,0,62,0.08);
      --btn-bg: radial-gradient(circle at 35% 35%, #ffd6e0, #ffb3c6);
      --btn-bg-active: radial-gradient(circle at 35% 35%, #ffc0d0, #ff99b3);
      --btn-ring: rgba(224,0,62,0.2);
      --btn-ring-far: rgba(224,0,62,0.1);
      --text: #1a0008;
      --text-dim: rgba(0,0,0,0.35);
      --flash: rgba(255,0,80,0.08);
      --combo: #d45f00;
      --combo-glow: rgba(212,95,0,0.6);
      --modal-bg: rgba(255,255,255,0.85);
      --modal-box: #fff;
      --modal-border: rgba(224,0,62,0.3);
      --reset-color: rgba(0,0,0,0.3);
      --reset-border: rgba(0,0,0,0.12);
      --cancel-color: rgba(0,0,0,0.5);
      --cancel-border: rgba(0,0,0,0.2);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.3s ease;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, var(--vignette) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleExplode ease-out forwards;
    }

    @keyframes particleExplode {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.2); }
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 5rem);
      color: var(--accent);
      text-shadow:
        0 0 20px var(--accent-glow-s),
        0 0 60px var(--accent-glow-m),
        0 0 100px var(--accent-glow-w);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      z-index: 2;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px var(--accent-glow-s), 0 0 60px var(--accent-glow-m); }
      50% { text-shadow: 0 0 30px var(--accent-glow-s), 0 0 80px var(--accent-glow-m), 0 0 120px var(--accent-glow-w); }
    }

    .counter {
      font-size: clamp(3rem, 15vw, 10rem);
      font-weight: 900;
      color: var(--text);
      text-shadow:
        0 0 20px var(--accent-glow-w),
        0 0 60px var(--accent-glow-w);
      z-index: 2;
      transition: transform 0.1s ease, color 0.3s ease;
      line-height: 1;
      margin-bottom: 2rem;
    }

    .counter.bump {
      transform: scale(1.15);
    }

    .subtitle {
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: var(--text-dim);
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      z-index: 2;
    }

    .btn-wrapper {
      z-index: 2;
      position: relative;
    }

    .click-btn {
      position: relative;
      width: clamp(160px, 40vw, 220px);
      height: clamp(160px, 40vw, 220px);
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: var(--btn-bg);
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
      cursor: pointer;
      outline: none;
      transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.08s ease, background 0.3s ease;
      box-shadow:
        0 0 30px var(--accent-glow-m),
        0 0 60px var(--accent-glow-w),
        inset 0 0 30px var(--accent-glow-w);
      -webkit-tap-highlight-color: transparent;
    }

    .click-btn::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--btn-ring);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .click-btn::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid var(--btn-ring-far);
      animation: ringPulse 2s ease-in-out infinite 0.5s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.4; }
    }

    .click-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 50px var(--accent-glow-s),
        0 0 100px var(--accent-glow-w),
        inset 0 0 40px var(--accent-glow-w);
      border-color: var(--accent-light);
    }

    .click-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 0 80px var(--accent-glow-s),
        0 0 150px var(--accent-glow-m),
        inset 0 0 60px var(--accent-glow-m);
      border-color: var(--accent-lighter);
      background: var(--btn-bg-active);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: var(--flash);
      pointer-events: none;
      z-index: 10;
      animation: flashOut 0.15s ease-out forwards;
    }

    @keyframes flashOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .click-text {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      pointer-events: none;
      z-index: 5;
      animation: clickTextUp 0.7s ease-out forwards;
      text-shadow: 0 0 10px var(--accent-glow-s);
    }

    @keyframes clickTextUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    .streak-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent));
      z-index: 10;
      transition: width 0.1s ease;
      box-shadow: 0 0 15px var(--accent-glow-s);
    }

    .streak-label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px var(--accent-glow-s);
    }

    .streak-label.visible {
      opacity: 1;
    }

    .milestone {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      color: var(--accent);
      z-index: 20;
      pointer-events: none;
      text-shadow: 0 0 40px var(--accent-glow-s), 0 0 80px var(--accent-glow-m);
      animation: milestoneIn 1.2s ease-out forwards;
    }

    @keyframes milestoneIn {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.3) rotate(3deg); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) rotate(0deg); opacity: 0; }
    }

    .combo-text {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 4vw, 2rem);
      font-weight: 900;
      color: var(--combo);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      text-shadow: 0 0 20px var(--combo-glow);
    }

    .combo-text.visible {
      opacity: 1;
    }

    .reset-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .reset-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--modal-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }

    .reset-modal.open {
      display: flex;
    }

    .reset-box {
      background: var(--modal-box);
      border: 1px solid var(--modal-border);
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 0 60px var(--accent-glow-w);
      max-width: 340px;
      width: 90%;
    }

    .reset-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .reset-sub {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    .reset-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .reset-confirm, .reset-cancel {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-confirm {
      background: var(--accent);
      color: #fff;
    }

    .reset-confirm:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow-s);
    }

    .reset-cancel {
      background: transparent;
      color: var(--cancel-color);
      border: 1px solid var(--cancel-border);
    }

    .reset-cancel:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .top-btns {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .top-btns-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    @media (max-width: 520px) {
      .top-btns { top: 10px; right: 10px; gap: 4px; }
      .top-btns-row { gap: 5px; }
      .theme-btn, .reset-btn, .lb-btn, .auto-btn {
        font-size: 0.75rem;
        padding: 8px 10px;
        min-width: 0;
      }
      .theme-btn { min-width: 80px; }
    }

    .theme-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 20px;
      min-width: 110px;
      text-align: center;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .auto-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .auto-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .auto-btn.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .lb-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .lb-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Welcome & Leaderboard modals */
    .welcome-modal, .lb-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--modal-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }

    .welcome-modal.open, .lb-modal.open {
      display: flex;
    }

    .welcome-box, .lb-box {
      background: var(--modal-box);
      border: 1px solid var(--modal-border);
      border-radius: 20px;
      padding: 22px 32px 24px;
      text-align: center;
      box-shadow: 0 0 80px var(--accent-glow-w), 0 0 0 1px rgba(255,255,255,0.05);
      max-width: 380px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }

    .lb-box {
      max-width: 420px;
      padding: 24px 20px;
    }

    .welcome-box {
      animation: welcomeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes welcomeIn {
      0% { opacity: 0; transform: scale(0.85) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .welcome-emoji {
      font-size: 2.4rem;
      margin-bottom: 4px;
      animation: welcomeBounce 2s ease-in-out infinite;
    }

    @keyframes welcomeBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .welcome-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 2px;
      text-shadow: 0 0 20px var(--accent-glow-s);
    }

    .welcome-subtitle {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      color: var(--text-dim);
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }

    .welcome-sub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin: 10px 0 6px;
    }

    .welcome-hint {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      color: var(--text-dim);
      margin: 2px 0 6px;
      opacity: 0.7;
    }

    .welcome-divider {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.6;
    }

    .welcome-divider::before,
    .welcome-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--text-dim);
      opacity: 0.4;
    }

    .welcome-error {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: #ff4466;
      margin-top: 6px;
      min-height: 1em;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s, transform 0.25s;
    }

    .welcome-error.visible {
      opacity: 1;
      transform: translateY(0);
      animation: errorShake 0.4s ease-in-out;
    }

    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .welcome-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px 14px 14px;
      margin-top: 0;
    }

    .welcome-section .welcome-sub {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .welcome-section .welcome-input {
      margin-bottom: 6px;
    }

    .welcome-input {
      display: block;
      width: 100%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      text-align: center;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--text-dim);
      border-radius: 10px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance: none;
      margin-bottom: 8px;
    }

    .welcome-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow-s);
      background: rgba(255,255,255,0.06);
    }

    .welcome-input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .welcome-input.pin {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      letter-spacing: 0.4em;
      max-width: 180px;
      margin: 0 auto 8px;
    }

    .welcome-submit {
      display: block;
      width: 100%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      margin-top: 4px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px var(--accent-glow-s);
    }

    .welcome-submit:hover {
      transform: scale(1.04);
      box-shadow: 0 4px 30px var(--accent-glow-s);
    }

    .welcome-submit:active {
      transform: scale(0.97);
    }

    .welcome-submit.secondary {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      box-shadow: none;
      font-size: 1.1rem;
      padding: 10px 24px;
    }

    .welcome-submit.secondary:hover {
      background: rgba(255,255,255,0.04);
      box-shadow: 0 0 16px var(--accent-glow-s);
    }

    /* Leaderboard list */
    .lb-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 6px;
      text-shadow: 0 0 20px var(--accent-glow-s);
    }

    .lb-subtitle {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    /* Top 3 podium */
    .lb-podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 16px;
      padding: 0 8px;
    }

    .lb-podium-card {
      flex: 1;
      text-align: center;
      border-radius: 10px;
      padding: 10px 6px 12px;
      position: relative;
      max-width: 120px;

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBODRiMSxiobCcA1y20uLC1DFtRuoOpymA",
      authDomain: "phonk-clicker.firebaseapp.com",

      projectId: "phonk-clicker",

      messagingSenderId: "645127821319",
      appId: "1:645127821319:web:36f7a852c23368d3ac32a2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('clickBtn');
    const particlesEl = document.getElementById('particles');

    function initAudio() {

    // 32-step NO BATIDÃO style sequence
    // Key: Fm, 130 BPM, progression: Fm → Db → Bbm → C
    let beatStep = 0;

    // Melody — F minor, hypnotic staccato hook following the chord progression
    const melodyPattern = [
      // Bar 1: Fm (F Ab C) — punchy descending hook
      { n: 349.2, d: 0.08 },  // F4
      { n: 523.3, d: 0.08 },  // C5

      // Bar 2: Db (Db F Ab) — response, higher energy
      { n: 554.4, d: 0.08 },  // Db5

      { n: 0 },
      { n: 415.3, d: 0.08 },  // Ab4

      // Bar 3: Bbm (Bb Db F) — darker, building tension
      { n: 466.2, d: 0.08 },  // Bb4
      { n: 349.2, d: 0.08 },  // F4
      { n: 277.2, d: 0.12 },  // Db4
      { n: 0 },
      { n: 349.2, d: 0.08 },  // F4
      { n: 466.2, d: 0.08 },  // Bb4
      { n: 349.2, d: 0.15 },  // F4
      { n: 0 },
      // Bar 4: C (C E G) — resolve, bright lift
      { n: 523.3, d: 0.08 },  // C5
      { n: 392.0, d: 0.08 },  // G4
      { n: 329.6, d: 0.12 },  // E4
      { n: 0 },
      { n: 392.0, d: 0.08 },  // G4
      { n: 523.3, d: 0.10 },  // C5
      { n: 392.0, d: 0.15 },  // G4
      { n: 0 },
    ];

    // 808 bass — root notes with heavy slides following Fm → Db → Bbm → C
    const bassPattern = [
      // Bar 1: Fm root = F
      87.3, 0, 0, 87.3,  0, 87.3, 0, 0,
      // Bar 2: Db root = Db
      69.3, 0, 0, 69.3,  0, 0, 69.3, 0,
      // Bar 3: Bbm root = Bb
      58.3, 0, 58.3, 0,  0, 58.3, 0, 0,
      // Bar 4: C root = C
      65.4, 0, 0, 65.4,  0, 0, 65.4, 65.4,
    ];

    // Bass slide amount (semitones to glide down from)
    const bassSlide = [
      7, 0, 0, 4,  0, 5, 0, 0,
      7, 0, 0, 4,  0, 0, 5, 0,
      7, 0, 5, 0,  0, 4, 0, 0,
      5, 0, 0, 4,  0, 0, 5, 8,
    ];

    // Drum pattern: K=kick, H=hat, C=cowbell, S=snare/clap, O=open hat
    // Batidão bounce — syncopated with cowbell driving the groove
    const drumPattern = [
      'K', 'C', 'H', 'C',  'S', 'C', 'H', 'K',
      'C', 'H', 'C', 'K',  'S', 'C', 'O', 'C',
      'K', 'C', 'H', 'C',  'S', 'C', 'K', 'H',
      'C', 'K', 'C', 'H',  'S', 'C', 'O', 'K',
    ];

    function makeDistortionCurve(amount) {
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    function playKick(now) {
      // Punchy batidão kick
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
      gain.gain.setValueAtTime(0.8, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.25);

      // Click transient for punch
      const click = audioCtx.createOscillator();
      const cGain = audioCtx.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(1000, now);
      click.frequency.exponentialRampToValueAtTime(200, now + 0.015);
      cGain.gain.setValueAtTime(0.3, now);
      cGain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
      click.connect(cGain); cGain.connect(audioCtx.destination);
      click.start(now); click.stop(now + 0.02);
    }

    function playSnare(now) {
      // Clap-style snare (Brazilian phonk clap)
      for (let i = 0; i < 3; i++) {
        const offset = now + i * 0.008;
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1);
        const noise = audioCtx.createBufferSource();
        const nGain = audioCtx.createGain();
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 0.8;
        noise.buffer = buf;
        nGain.gain.setValueAtTime(0.35, offset);
        nGain.gain.exponentialRampToValueAtTime(0.001, offset + 0.08);
        noise.connect(bp); bp.connect(nGain); nGain.connect(audioCtx.destination);
        noise.start(offset);
      }
      // Tonal body
      const osc = audioCtx.createOscillator();
      const oGain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(250, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      oGain.gain.setValueAtTime(0.3, now);
      oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(oGain); oGain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.08);
    }

    function playHiHat(now, open) {
      const dur = open ? 0.14 : 0.035;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const noise = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = open ? 7000 : 9000;
      noise.buffer = buf;
      gain.gain.setValueAtTime(open ? 0.15 : 0.10, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      noise.connect(hp); hp.connect(gain); gain.connect(audioCtx.destination);
      noise.start(now);
    }

    function playCowbell(now) {
      // Loud metallic cowbell — signature batidão sound
      const freqs = [587.3, 845];
      freqs.forEach(f => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = f; bp.Q.value = 12;
        osc.type = 'square';
        osc.frequency.setValueAtTime(f, now);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.connect(bp); bp.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.06);
      });
      // Extra click transient for attack
      const click = audioCtx.createOscillator();
      const cg = audioCtx.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(2000, now);
      cg.gain.setValueAtTime(0.15, now);
      cg.gain.exponentialRampToValueAtTime(0.001, now + 0.01);
      click.connect(cg); cg.connect(audioCtx.destination);
      click.start(now); click.stop(now + 0.01);
    }

    function playBass(now, freq, slide) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(200);

      // Start higher and slide down for that 808 glide
      const startFreq = freq * Math.pow(2, slide / 12);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(startFreq, now);
      osc.frequency.exponentialRampToValueAtTime(freq, now + 0.12);

      gain.gain.setValueAtTime(0.6, now);
      gain.gain.setValueAtTime(0.5, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

      osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.35);

      // Sub layer for extra weight
      const sub = audioCtx.createOscillator();
      const subG = audioCtx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(freq * 0.5, now);
      subG.gain.setValueAtTime(0.3, now);
      subG.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      sub.connect(subG); subG.connect(audioCtx.destination);
      sub.start(now); sub.stop(now + 0.3);
    }

    function playMelodyNote(now, freq, dur) {
      // Aggressive staccato lead — punchy and distorted like phonk synths
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(80);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(4000, now);
      filter.frequency.exponentialRampToValueAtTime(1200, now + dur);
      filter.Q.value = 6;

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.16, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(dist); dist.connect(filter); filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + dur);

      // Detuned layer for thickness
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(freq * 0.998, now);
      g2.gain.setValueAtTime(0.08, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc2.connect(g2); g2.connect(audioCtx.destination);
      osc2.start(now); osc2.stop(now + dur);

      // Sub octave for weight
      const osc3 = audioCtx.createOscillator();
      const g3 = audioCtx.createGain();
      osc3.type = 'sine';
      osc3.frequency.setValueAtTime(freq * 0.5, now);
      g3.gain.setValueAtTime(0.06, now);
      g3.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.8);
      osc3.connect(g3); g3.connect(audioCtx.destination);
      osc3.start(now); osc3.stop(now + dur);
    }

    function playPhonkSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const step = beatStep % 32;
      beatStep++;

      // Drums
      const drum = drumPattern[step];
      if (drum === 'K') playKick(now);
      else if (drum === 'S') playSnare(now);
      else if (drum === 'H') playHiHat(now, false);
      else if (drum === 'O') playHiHat(now, true);
      else if (drum === 'C') playCowbell(now);

      // 808 bass with slide
      const bassFreq = bassPattern[step];
      if (bassFreq > 0) playBass(now, bassFreq, bassSlide[step]);

      // Melody
      const mel = melodyPattern[step];
      if (mel.n > 0) playMelodyNote(now, mel.n, mel.d);
    }

    function spawnParticles(x, y) {
      const colors = ['#ff0050', '#ff3377', '#ff5599', '#ffaa00', '#ffffff', '#ff0033'];
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      const baseCount = 10 + Math.min(streak * 2, 30);
      for (let i = 0; i < baseCount; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 10 + 3;
        const angle = (Math.PI * 2 * i) / baseCount + (Math.random() - 0.5) * 0.4;
        // Travel distance: 30%-80% of the screen size, radiating outward
        const reach = (0.3 + Math.random() * 0.5) * Math.max(screenW, screenH);
        const px = Math.cos(angle) * reach;
        const py = Math.sin(angle) * reach;
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = color;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.setProperty('--px', px + 'px');
        p.style.setProperty('--py', py + 'px');
        p.style.boxShadow = `0 0 ${size * 3}px ${color}`;
        p.style.animationDuration = (Math.random() * 0.6 + 0.5) + 's';
        particlesEl.appendChild(p);
        setTimeout(() => p.remove(), 1200);
      }
    }

    function showClickText(x, y) {
      const texts = ['+1', 'BOOM', 'FIRE', 'YO!', 'HARD', 'BANG', 'SHEESH', 'W', 'LET\'S GO'];
      const el = document.createElement('div');
      el.className = 'click-text';
      el.textContent = streak > 3 ? texts[Math.floor(Math.random() * texts.length)] : '+1';
      el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = (y - 30) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function showFlash() {
      const flash = document.createElement('div');
      flash.className = 'flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 150);
    }

    function showMilestone(text) {
      const el = document.createElement('div');
      el.className = 'milestone';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function updateStreak() {
      const now = Date.now();
      const timeSinceLast = now - lastClickTime;
      lastClickTime = now;

      if (timeSinceLast < 500) {
        streak++;
      } else if (timeSinceLast < 1000) {
        streak = Math.max(1, streak);
      } else {
        streak = 1;
      }

      const pct = Math.min(streak / 20, 1) * 100;
      streakBar.style.width = pct + '%';

      if (streak >= 3) {
        streakLabel.textContent = `${streak}x STREAK`;
        streakLabel.classList.add('visible');
      }

      if (streak >= 5) {
        comboText.textContent = streak >= 20 ? 'UNSTOPPABLE' : streak >= 15 ? 'GODLIKE' : streak >= 10 ? 'ON FIRE' : 'COMBO';
        comboText.classList.add('visible');
        comboText.style.transform = `translateX(-50%) scale(${1 + streak * 0.02})`;
      }

      clearTimeout(streakTimer);
      streakTimer = setTimeout(() => {
        streak = 0;
        streakBar.style.width = '0%';
        streakLabel.classList.remove('visible');
        comboText.classList.remove('visible');
      }, 1200);
    }

    function handleClick(e) {
      initAudio();
      count++;
      counterEl.textContent = count.toLocaleString();

      // Bump animation
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 100);

      // Effects
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      updateStreak();
      playPhonkSound();
      spawnParticles(cx, cy);
      showClickText(cx, cy);
      showFlash();

      // Milestones
      const milestones = { 10: 'WARMING UP!', 25: 'GETTING HYPE!', 50: 'HALFWAY LIT!', 100: '100 HITS!', 250: 'BEAST MODE!', 500: 'LEGENDARY!', 1000: 'PHONK GOD!' };
      if (milestones[count]) {
        showMilestone(milestones[count]);
      }

      // Sync score to leaderboard
      debouncedSubmit();

      // Hue shift at milestones
      if (count % 100 === 0) {
        document.body.style.transition = 'background 0.5s';
        document.body.style.background = getComputedStyle(document.body).getPropertyValue('--bg-alt');
        setTimeout(() => { document.body.style.background = ''; }, 500);
      }
    }

    btn.addEventListener('click', handleClick);
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleClick(e);
    }, { passive: false });

    // Keyboard support — ignore held keys (repeat events)
    document.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      if (e.key === ' ' || e.key === 'Enter' || e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        btn.click();
      }
    });

    // Reset with confirmation
    const resetBtn = document.getElementById('resetBtn');
    const resetModal = document.getElementById('resetModal');
    const resetConfirm = document.getElementById('resetConfirm');
    const resetCancel = document.getElementById('resetCancel');

    resetBtn.addEventListener('click', () => {
      resetModal.classList.add('open');
    });

    resetCancel.addEventListener('click', () => {
      resetModal.classList.remove('open');
    });

    resetConfirm.addEventListener('click', () => {
      count = 0;
      beatStep = 0;
      streak = 0;
      counterEl.textContent = '0';
      streakBar.style.width = '0%';
      streakLabel.classList.remove('visible');
      comboText.classList.remove('visible');
      resetModal.classList.remove('open');
      // Reset remote score
      if (playerName && playerKey) {
        db.ref('players/' + playerKey).update({
          score: 0,
          pin: playerPin,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        });
      }
    });

    resetModal.addEventListener('click', (e) => {
      if (e.target === resetModal) resetModal.classList.remove('open');
    });

    // Auto-play at 130 BPM (one beat = 60/130 * 1000ms ≈ 462ms)
    const autoBtn = document.getElementById('autoBtn');
    let autoInterval = null;

    autoBtn.addEventListener('click', () => {
      initAudio();
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        autoBtn.classList.remove('active');
        autoBtn.innerHTML = '&#9654; AUTO';
      } else {
        autoBtn.classList.add('active');
        autoBtn.innerHTML = '&#9646;&#9646; STOP';
        autoInterval = setInterval(() => {
          btn.click();
        }, 462);
      }
    });

    // Theme toggle
    const themeBtn = document.getElementById('themeBtn');
    let isLight = localStorage.getItem('phonkTheme') === 'light';
    if (isLight) document.body.classList.add('light');
    updateThemeIcon();

    function updateThemeIcon() {
      themeBtn.innerHTML = isLight ? '<span style="font-size:1.1rem">\u263E</span> DARK' : '<span style="font-size:1.1rem">\u2600</span> LIGHT';
    }

    themeBtn.addEventListener('click', () => {
      isLight = !isLight;
      document.body.classList.toggle('light', isLight);
      localStorage.setItem('phonkTheme', isLight ? 'light' : 'dark');
      updateThemeIcon();
    });

    // ─── Leaderboard & Player Identity ───
    const lbBtn = document.getElementById('lbBtn');
    const lbModal = document.getElementById('lbModal');
    const lbClose = document.getElementById('lbClose');
    const lbList = document.getElementById('lbList');
    const welcomeModal = document.getElementById('welcomeModal');
    const playerTag = document.getElementById('playerTag');

    let playerName = localStorage.getItem('phonkPlayerName') || '';
    let playerPin = localStorage.getItem('phonkPlayerPin') || '';
    let playerKey = playerName ? playerName.toLowerCase().replace(/[^a-z0-9]/g, '') : '';

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function sanitizeName(str) {
      return str.replace(/[<>&"'/]/g, '').trim().substring(0, 16);
    }

    function showWelcomeError(el, msg) {
      el.classList.remove('visible');
      el.textContent = msg;
      // Force reflow so animation restarts if already visible
      void el.offsetWidth;
      el.classList.add('visible');
    }

    function clearWelcomeError(el) {
      el.classList.remove('visible');
      el.textContent = '';
    }

    function showPlayerTag() {
      if (playerName) {
        playerTag.innerHTML = 'Playing as <span class="player-tag-name">' + escapeHtml(playerName) + '</span><span class="player-tag-switch" id="switchUserBtn" title="Switch user">&#x21C4;</span>';
        document.getElementById('switchUserBtn').addEventListener('click', switchUser);
      } else {
        playerTag.innerHTML = '';
      }
    }

    function switchUser() {
      // Flush any pending score sync immediately
      if (playerKey && playerName) {
        clearTimeout(submitTimer);
        db.ref('players/' + playerKey).transaction(current => {
          if (current && count > (current.score || 0)) {
            current.score = count;
            current.pin = playerPin;
            current.updatedAt = firebase.database.ServerValue.TIMESTAMP;
            return current;
          }
          return;
        });
        // Detach real-time listener for old player
        db.ref('players/' + playerKey + '/score').off();
      }
      // Clear local state
      playerName = '';
      playerPin = '';
      playerKey = '';
      localStorage.removeItem('phonkPlayerName');
      localStorage.removeItem('phonkPlayerPin');
      playerTag.innerHTML = '';
      // Reset inputs & errors
      document.getElementById('nameInput').value = '';
      document.getElementById('pinInput').value = '';
      document.getElementById('loginNameInput').value = '';
      document.getElementById('loginPinInput').value = '';
      clearWelcomeError(document.getElementById('welcomeError'));
      clearWelcomeError(document.getElementById('loginError'));
      // Reopen welcome modal
      welcomeModal.classList.add('open');
    }

    // Show welcome modal on first visit
    if (!playerName) {
      welcomeModal.classList.add('open');
    } else {
      showPlayerTag();
      // Real-time sync — picks up higher score from other tabs/devices
      listenToOwnScore();
    }

    // New player registration
    document.getElementById('welcomeSubmit').addEventListener('click', () => {
      const name = sanitizeName(document.getElementById('nameInput').value);
      const pin = document.getElementById('pinInput').value;
      const errEl = document.getElementById('welcomeError');
      clearWelcomeError(errEl);

      if (!name) { showWelcomeError(errEl, 'Enter a username!'); return; }
      if (!/^\d{4}$/.test(pin)) { showWelcomeError(errEl, 'PIN must be 4 digits!'); return; }

      const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!key) { showWelcomeError(errEl, 'Invalid username!'); return; }

      const ref = db.ref('players/' + key);
      ref.once('value', snap => {
        if (snap.exists()) {
          showWelcomeError(errEl, 'Username already taken!');
          return;
        }
        ref.set({
          name: name,
          pin: pin,
          score: count,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
          playerName = name;
          playerPin = pin;
          playerKey = key;
          localStorage.setItem('phonkPlayerName', name);
          localStorage.setItem('phonkPlayerPin', pin);
          welcomeModal.classList.remove('open');
          showPlayerTag();
          listenToOwnScore();
        }).catch(() => {
          showWelcomeError(errEl, 'Something went wrong!');
        });
      });
    });

    // Sign in (cross-device)
    document.getElementById('loginSubmit').addEventListener('click', () => {
      const name = sanitizeName(document.getElementById('loginNameInput').value);
      const pin = document.getElementById('loginPinInput').value;
      const errEl = document.getElementById('loginError');
      clearWelcomeError(errEl);

      if (!name) { showWelcomeError(errEl, 'Enter your username!'); return; }
      if (!/^\d{4}$/.test(pin)) { showWelcomeError(errEl, 'PIN must be 4 digits!'); return; }

      const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!key) { showWelcomeError(errEl, 'Invalid username!'); return; }

      const ref = db.ref('players/' + key);
      ref.once('value', snap => {
        if (!snap.exists()) {
          showWelcomeError(errEl, 'Username not found!');
          return;
        }
        // Try updating — Firebase rules will reject if PIN doesn't match
        ref.update({
          pin: pin,
          score: Math.max(count, snap.val().score || 0),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
          playerName = snap.val().name;
          playerPin = pin;
          playerKey = key;
          // Load remote score
          const remote = snap.val().score || 0;
          if (remote > count) {
            count = remote;
            counterEl.textContent = count.toLocaleString();
          }
          localStorage.setItem('phonkPlayerName', playerName);
          localStorage.setItem('phonkPlayerPin', pin);
          welcomeModal.classList.remove('open');
          showPlayerTag();
          listenToOwnScore();
        }).catch(() => {
          showWelcomeError(errEl, 'Wrong PIN!');
        });
      });
    });

    // Debounced auto-sync (5 seconds) — uses transaction to prevent stale tabs overwriting higher scores
    let submitTimer = null;
    function debouncedSubmit() {
      if (!playerName || !playerKey) return;
      clearTimeout(submitTimer);
      submitTimer = setTimeout(() => {
        db.ref('players/' + playerKey).transaction(current => {
          if (current === null) {
            // Entry doesn't exist yet — create it
            return { name: playerName, pin: playerPin, score: count, updatedAt: firebase.database.ServerValue.TIMESTAMP };
          }
          // Only update if local count is higher than remote
          if (count > (current.score || 0)) {
            current.score = count;
            current.pin = playerPin;
            current.updatedAt = firebase.database.ServerValue.TIMESTAMP;
            return current;
          }
          // Local is stale — abort the write (return undefined)
          return;
        });
      }, 5000);
    }

    // Real-time listener on own score — keeps local count in sync across tabs/devices
    function listenToOwnScore() {
      if (!playerKey) return;
      db.ref('players/' + playerKey + '/score').on('value', snap => {
        const remote = snap.val();
        if (remote != null && remote > count) {
          count = remote;
          counterEl.textContent = count.toLocaleString();
        }
      });
    }

    // Leaderboard modal — auto-scroll to player's row on open
    const lbMyRank = document.getElementById('lbMyRank');
    lbBtn.addEventListener('click', () => {
      lbModal.classList.add('open');
      setTimeout(() => {
        const myRow = lbList.querySelector('.lb-me');
        if (myRow) myRow.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }, 50);
    });
    lbClose.addEventListener('click', () => { lbModal.classList.remove('open'); });
    lbModal.addEventListener('click', (e) => { if (e.target === lbModal) lbModal.classList.remove('open'); });

    // Real-time leaderboard listener (top 25)
    const lbPodium = document.getElementById('lbPodium');
    db.ref('players').orderByChild('score').limitToLast(25).on('value', snap => {
      const entries = [];
      snap.forEach(child => {
        const d = child.val();
        entries.push({ key: child.key, name: d.name || child.key, score: d.score || 0 });
      });
      entries.sort((a, b) => b.score - a.score);

      if (entries.length === 0) {
        lbPodium.innerHTML = '';
        lbList.innerHTML = '<div class="lb-empty">NO SCORES YET</div>';
        lbMyRank.style.display = 'none';
        return;
      }

      // Find player's rank
      const myIndex = entries.findIndex(e => e.key === playerKey);
      const youBadge = '<span class="lb-you-badge">YOU</span>';

      // Top 3 podium cards (order: silver, gold, bronze via CSS)
      const medals = ['🥇', '🥈', '🥉'];
      const classes = ['gold', 'silver', 'bronze'];
      const top3 = entries.slice(0, 3);
      lbPodium.innerHTML = top3.map((e, i) => {
        const isMe = e.key === playerKey;
        return '<div class="lb-podium-card ' + classes[i] + (isMe ? ' lb-me' : '') + '">' +
          '<span class="lb-podium-medal">' + medals[i] + '</span>' +
          '<div class="lb-podium-name">' + escapeHtml(e.name) + '</div>' +
          '<div class="lb-podium-score">' + e.score.toLocaleString() + '</div>' +
          '</div>';
      }).join('');

      // Rest of the list (rank 4+)
      const rest = entries.slice(3);
      if (rest.length === 0) {
        lbList.innerHTML = '';
      } else {
        lbList.innerHTML = rest.map((e, i) => {
          const isMe = e.key === playerKey;
          const rank = i + 4;
          return '<div class="lb-row' + (isMe ? ' lb-me' : '') + '">' +
            '<span class="lb-rank">' + rank + '</span>' +
            '<span class="lb-name">' + escapeHtml(e.name) + (isMe ? ' ' + youBadge : '') + '</span>' +
            '<span class="lb-score">' + e.score.toLocaleString() + '</span>' +
            '</div>';
        }).join('');
      }

      // Sticky "your rank" bar — always visible at bottom
      if (myIndex >= 0) {
        const me = entries[myIndex];
        const myRank = myIndex + 1;
        lbMyRank.style.display = 'flex';
        lbMyRank.innerHTML =
          '<span class="lb-rank">#' + myRank + '</span>' +
          '<span class="lb-name">' + escapeHtml(me.name) + ' <span class="lb-you-badge">YOU</span></span>' +
          '<span class="lb-score">' + me.score.toLocaleString() + '</span>';
      } else {
        lbMyRank.style.display = 'none';
      }
    });
  </script>
</body>
</html>
