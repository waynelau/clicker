<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHONK CLICKER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,0,80,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,80,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) scale(0); }
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #ff0050;
      text-shadow:
        0 0 20px rgba(255,0,80,0.5),
        0 0 60px rgba(255,0,80,0.3),
        0 0 100px rgba(255,0,80,0.1);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      z-index: 2;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255,0,80,0.5), 0 0 60px rgba(255,0,80,0.3); }
      50% { text-shadow: 0 0 30px rgba(255,0,80,0.8), 0 0 80px rgba(255,0,80,0.5), 0 0 120px rgba(255,0,80,0.2); }
    }

    .counter {
      font-size: clamp(3rem, 15vw, 10rem);
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.3),
        0 0 60px rgba(255,0,80,0.2);
      z-index: 2;
      transition: transform 0.1s ease;
      line-height: 1;
      margin-bottom: 2rem;
    }

    .counter.bump {
      transform: scale(1.15);
    }

    .subtitle {
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      z-index: 2;
    }

    .btn-wrapper {
      z-index: 2;
      position: relative;
    }

    .click-btn {
      position: relative;
      width: clamp(160px, 40vw, 220px);
      height: clamp(160px, 40vw, 220px);
      border-radius: 50%;
      border: 3px solid #ff0050;
      background: radial-gradient(circle at 35% 35%, #2a0015, #150008);
      color: #ff0050;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
      cursor: pointer;
      outline: none;
      transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.08s ease;
      box-shadow:
        0 0 30px rgba(255,0,80,0.3),
        0 0 60px rgba(255,0,80,0.1),
        inset 0 0 30px rgba(255,0,80,0.1);
      -webkit-tap-highlight-color: transparent;
    }

    .click-btn::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,0,80,0.2);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .click-btn::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(255,0,80,0.1);
      animation: ringPulse 2s ease-in-out infinite 0.5s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.4; }
    }

    .click-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 50px rgba(255,0,80,0.5),
        0 0 100px rgba(255,0,80,0.2),
        inset 0 0 40px rgba(255,0,80,0.2);
      border-color: #ff3377;
    }

    .click-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 0 80px rgba(255,0,80,0.8),
        0 0 150px rgba(255,0,80,0.3),
        inset 0 0 60px rgba(255,0,80,0.3);
      border-color: #ff5599;
      background: radial-gradient(circle at 35% 35%, #3d001f, #1f000d);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 80, 0.06);
      pointer-events: none;
      z-index: 10;
      animation: flashOut 0.15s ease-out forwards;
    }

    @keyframes flashOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .click-text {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: #ff0050;
      pointer-events: none;
      z-index: 5;
      animation: clickTextUp 0.7s ease-out forwards;
      text-shadow: 0 0 10px rgba(255,0,80,0.8);
    }

    @keyframes clickTextUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    .streak-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #ff0050, #ff3377, #ff0050);
      z-index: 10;
      transition: width 0.1s ease;
      box-shadow: 0 0 15px rgba(255,0,80,0.8);
    }

    .streak-label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: #ff0050;
      letter-spacing: 0.2em;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px rgba(255,0,80,0.5);
    }

    .streak-label.visible {
      opacity: 1;
    }

    .milestone {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      color: #ff0050;
      z-index: 20;
      pointer-events: none;
      text-shadow: 0 0 40px rgba(255,0,80,0.8), 0 0 80px rgba(255,0,80,0.4);
      animation: milestoneIn 1.2s ease-out forwards;
    }

    @keyframes milestoneIn {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.3) rotate(3deg); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) rotate(0deg); opacity: 0; }
    }

    .combo-text {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 4vw, 2rem);
      font-weight: 900;
      color: #ffaa00;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      text-shadow: 0 0 20px rgba(255,170,0,0.8);
    }

    .combo-text.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="vignette"></div>
  <div class="particles" id="particles"></div>

  <div class="subtitle">TOTAL CLICKS</div>
  <div class="counter" id="counter">0</div>
  <div class="title">PHONK CLICKER</div>

  <div class="btn-wrapper">
    <button class="click-btn" id="clickBtn">HIT IT</button>
  </div>

  <div class="streak-bar" id="streakBar" style="width: 0%"></div>
  <div class="streak-label" id="streakLabel"></div>
  <div class="combo-text" id="comboText"></div>

  <script>
    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('clickBtn');
    const particlesEl = document.getElementById('particles');
    const streakBar = document.getElementById('streakBar');
    const streakLabel = document.getElementById('streakLabel');
    const comboText = document.getElementById('comboText');

    let count = parseInt(localStorage.getItem('phonkClicks') || '0');
    let streak = 0;
    let streakTimer = null;
    let lastClickTime = 0;
    let audioCtx = null;

    counterEl.textContent = count.toLocaleString();

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // 16-step phonk beat sequence — each click advances one step
    let beatStep = 0;

    // Dark minor melody notes (Hz) — catchy phonk loop
    const melodyPattern = [
      { note: 311.1, type: 'long' },   // Eb4
      { note: 0, type: 'rest' },
      { note: 370.0, type: 'short' },  // F#4
      { note: 311.1, type: 'short' },  // Eb4
      { note: 0, type: 'rest' },
      { note: 415.3, type: 'long' },   // Ab4
      { note: 370.0, type: 'short' },  // F#4
      { note: 311.1, type: 'short' },  // Eb4
      { note: 293.7, type: 'long' },   // D4
      { note: 0, type: 'rest' },
      { note: 311.1, type: 'short' },  // Eb4
      { note: 370.0, type: 'long' },   // F#4
      { note: 0, type: 'rest' },
      { note: 415.3, type: 'short' },  // Ab4
      { note: 370.0, type: 'short' },  // F#4
      { note: 293.7, type: 'long' },   // D4
    ];

    // 808 bass pattern — root notes that hit hard
    const bassPattern = [
      155.6, 0, 0, 155.6,
      0, 103.8, 0, 0,
      116.5, 0, 116.5, 0,
      103.8, 0, 0, 103.8
    ];

    // Drum pattern: K=kick, H=hat, S=snare, O=open hat
    const drumPattern = [
      'K', 'H', 'H', 'K',
      'S', 'H', 'K', 'O',
      'K', 'H', 'H', 'K',
      'S', 'O', 'H', 'K'
    ];

    function makeDistortionCurve(amount) {
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    function playKick(now) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(35, now + 0.2);
      gain.gain.setValueAtTime(0.7, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
    }

    function playSnare(now) {
      // Snare body
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
      oscGain.gain.setValueAtTime(0.4, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.1);
      // Snare noise
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const noise = audioCtx.createBufferSource();
      const nGain = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 3000;
      noise.buffer = buf;
      nGain.gain.setValueAtTime(0.25, now);
      nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      noise.connect(hp); hp.connect(nGain); nGain.connect(audioCtx.destination);
      noise.start(now);
    }

    function playHiHat(now, open) {
      const dur = open ? 0.12 : 0.04;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const noise = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = open ? 8000 : 10000; bp.Q.value = 1;
      noise.buffer = buf;
      gain.gain.setValueAtTime(open ? 0.18 : 0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      noise.connect(bp); bp.connect(gain); gain.connect(audioCtx.destination);
      noise.start(now);
    }

    function playBass(now, freq) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(150);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.7, now + 0.25);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
    }

    function playMelody(now, freq, type) {
      const dur = type === 'long' ? 0.2 : 0.1;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();

      // Main voice — dark square lead
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.setValueAtTime(0.12, now + dur * 0.6);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + dur);

      // Detuned layer for thickness
      osc2.type = 'sawtooth';
      osc2.frequency.setValueAtTime(freq * 1.003, now);
      gain2.gain.setValueAtTime(0.06, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.start(now); osc2.stop(now + dur);
    }

    function playPhonkSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const step = beatStep % 16;
      beatStep++;

      // Drums
      const drum = drumPattern[step];
      if (drum === 'K') playKick(now);
      else if (drum === 'S') playSnare(now);
      else if (drum === 'H') playHiHat(now, false);
      else if (drum === 'O') playHiHat(now, true);

      // 808 bass
      const bassFreq = bassPattern[step];
      if (bassFreq > 0) playBass(now, bassFreq);

      // Melody
      const mel = melodyPattern[step];
      if (mel.note > 0) playMelody(now, mel.note, mel.type);
    }

    function spawnParticles(x, y) {
      const colors = ['#ff0050', '#ff3377', '#ff5599', '#ffaa00', '#ffffff'];
      const count = 6 + Math.min(streak, 15);
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 8 + 3;
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5);
        const dist = Math.random() * 80 + 30;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = (x + Math.cos(angle) * dist) + 'px';
        p.style.top = (y + Math.sin(angle) * dist) + 'px';
        p.style.boxShadow = `0 0 ${size * 2}px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 0.5 + 0.4) + 's';
        particlesEl.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    function showClickText(x, y) {
      const texts = ['+1', 'BOOM', 'FIRE', 'YO!', 'HARD', 'BANG', 'SHEESH', 'W', 'LET\'S GO'];
      const el = document.createElement('div');
      el.className = 'click-text';
      el.textContent = streak > 3 ? texts[Math.floor(Math.random() * texts.length)] : '+1';
      el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = (y - 30) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function showFlash() {
      const flash = document.createElement('div');
      flash.className = 'flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 150);
    }

    function showMilestone(text) {
      const el = document.createElement('div');
      el.className = 'milestone';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function updateStreak() {
      const now = Date.now();
      const timeSinceLast = now - lastClickTime;
      lastClickTime = now;

      if (timeSinceLast < 500) {
        streak++;
      } else if (timeSinceLast < 1000) {
        streak = Math.max(1, streak);
      } else {
        streak = 1;
      }

      const pct = Math.min(streak / 20, 1) * 100;
      streakBar.style.width = pct + '%';

      if (streak >= 3) {
        streakLabel.textContent = `${streak}x STREAK`;
        streakLabel.classList.add('visible');
      }

      if (streak >= 5) {
        comboText.textContent = streak >= 20 ? 'UNSTOPPABLE' : streak >= 15 ? 'GODLIKE' : streak >= 10 ? 'ON FIRE' : 'COMBO';
        comboText.classList.add('visible');
        comboText.style.transform = `translateX(-50%) scale(${1 + streak * 0.02})`;
      }

      clearTimeout(streakTimer);
      streakTimer = setTimeout(() => {
        streak = 0;
        streakBar.style.width = '0%';
        streakLabel.classList.remove('visible');
        comboText.classList.remove('visible');
      }, 1200);
    }

    function handleClick(e) {
      initAudio();
      count++;
      localStorage.setItem('phonkClicks', count.toString());
      counterEl.textContent = count.toLocaleString();

      // Bump animation
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 100);

      // Effects
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      updateStreak();
      playPhonkSound();
      spawnParticles(cx, cy);
      showClickText(cx, cy);
      showFlash();

      // Milestones
      const milestones = { 10: 'WARMING UP!', 25: 'GETTING HYPE!', 50: 'HALFWAY LIT!', 100: '100 HITS!', 250: 'BEAST MODE!', 500: 'LEGENDARY!', 1000: 'PHONK GOD!' };
      if (milestones[count]) {
        showMilestone(milestones[count]);
      }

      // Hue shift at milestones
      if (count % 100 === 0) {
        document.body.style.transition = 'background 0.5s';
        document.body.style.background = '#120008';
        setTimeout(() => { document.body.style.background = '#0a0a0a'; }, 500);
      }
    }

    btn.addEventListener('click', handleClick);
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleClick(e);
    }, { passive: false });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        btn.click();
      }
    });
  </script>
</body>
</html>
