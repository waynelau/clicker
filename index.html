<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>PHONK CLICKER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --bg-alt: #120008;
      --grid-color: rgba(0,229,255,0.18);
      --vignette: rgba(0,0,0,0.8);
      --accent: #ff0050;
      --accent-light: #ff3377;
      --accent-lighter: #ff5599;
      --accent-glow-s: rgba(255,0,80,0.5);
      --accent-glow-m: rgba(255,0,80,0.3);
      --accent-glow-w: rgba(255,0,80,0.1);
      --btn-bg: radial-gradient(circle at 35% 35%, #2a0015, #150008);
      --btn-bg-active: radial-gradient(circle at 35% 35%, #3d001f, #1f000d);
      --btn-ring: rgba(255,0,80,0.2);
      --btn-ring-far: rgba(255,0,80,0.1);
      --text: #fff;
      --text-dim: rgba(255,255,255,0.3);
      --flash: rgba(255,0,80,0.06);
      --combo: #ffaa00;
      --combo-glow: rgba(255,170,0,0.8);
      --modal-bg: rgba(0,0,0,0.8);
      --modal-box: #141414;
      --modal-border: rgba(255,0,80,0.3);
      --reset-color: rgba(255,255,255,0.3);
      --reset-border: rgba(255,255,255,0.1);
      --cancel-color: rgba(255,255,255,0.6);
      --cancel-border: rgba(255,255,255,0.2);
    }

    .light {
      --bg: #f5f0f2;
      --bg-alt: #ffe8ee;
      --grid-color: rgba(0,180,220,0.08);
      --vignette: rgba(255,255,255,0.6);
      --accent: #e0003e;
      --accent-light: #ff1a5e;
      --accent-lighter: #ff4d80;
      --accent-glow-s: rgba(224,0,62,0.35);
      --accent-glow-m: rgba(224,0,62,0.2);
      --accent-glow-w: rgba(224,0,62,0.08);
      --btn-bg: radial-gradient(circle at 35% 35%, #ffd6e0, #ffb3c6);
      --btn-bg-active: radial-gradient(circle at 35% 35%, #ffc0d0, #ff99b3);
      --btn-ring: rgba(224,0,62,0.2);
      --btn-ring-far: rgba(224,0,62,0.1);
      --text: #1a0008;
      --text-dim: rgba(0,0,0,0.35);
      --flash: rgba(255,0,80,0.08);
      --combo: #d45f00;
      --combo-glow: rgba(212,95,0,0.6);
      --modal-bg: rgba(255,255,255,0.85);
      --modal-box: #fff;
      --modal-border: rgba(224,0,62,0.3);
      --reset-color: rgba(0,0,0,0.3);
      --reset-border: rgba(0,0,0,0.12);
      --cancel-color: rgba(0,0,0,0.5);
      --cancel-border: rgba(0,0,0,0.2);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.3s ease;
    }

    .bg-grid {
      position: fixed;
      inset: -40px;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      animation: gridDrift 20s linear infinite, gridPulse 4s ease-in-out infinite;
    }

    @keyframes gridDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, var(--vignette) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      transform: translateZ(0);
      contain: layout paint;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleExplode ease-out forwards;
    }

    @keyframes particleExplode {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.2); }
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 5rem);
      color: var(--accent);
      text-shadow:
        0 0 20px var(--accent-glow-s),
        0 0 60px var(--accent-glow-m),
        0 0 100px var(--accent-glow-w);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      z-index: 2;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px var(--accent-glow-s), 0 0 60px var(--accent-glow-m); }
      50% { text-shadow: 0 0 30px var(--accent-glow-s), 0 0 80px var(--accent-glow-m), 0 0 120px var(--accent-glow-w); }
    }

    .counter {
      font-size: clamp(3rem, 15vw, 10rem);
      font-weight: 900;
      color: var(--text);
      text-shadow:
        0 0 20px var(--accent-glow-w),
        0 0 60px var(--accent-glow-w);
      z-index: 2;
      transition: transform 0.1s ease, color 0.3s ease;
      line-height: 1;
      margin-bottom: 2rem;
    }

    .counter.bump {
      transform: scale(1.15);
    }

    .subtitle {
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: var(--text-dim);
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      z-index: 2;
    }

    .btn-wrapper {
      z-index: 2;
      position: relative;
    }

    .click-btn {
      position: relative;
      width: clamp(160px, 40vw, 220px);
      height: clamp(160px, 40vw, 220px);
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: var(--btn-bg);
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
      cursor: pointer;
      outline: none;
      transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.08s ease, background 0.3s ease;
      box-shadow:
        0 0 30px var(--accent-glow-m),
        0 0 60px var(--accent-glow-w),
        inset 0 0 30px var(--accent-glow-w);
      -webkit-tap-highlight-color: transparent;
    }

    .click-btn::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--btn-ring);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .click-btn::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid var(--btn-ring-far);
      animation: ringPulse 2s ease-in-out infinite 0.5s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.4; }
    }

    .click-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 50px var(--accent-glow-s),
        0 0 100px var(--accent-glow-w),
        inset 0 0 40px var(--accent-glow-w);
      border-color: var(--accent-light);
    }

    .click-btn:active,
    .click-btn.pressed {
      transform: scale(0.92);
      box-shadow:
        0 0 80px var(--accent-glow-s),
        0 0 150px var(--accent-glow-m),
        inset 0 0 60px var(--accent-glow-m);
      border-color: var(--accent-lighter);
      background: var(--btn-bg-active);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: var(--flash);
      pointer-events: none;
      z-index: 10;
      animation: flashOut 0.15s ease-out forwards;
    }

    @keyframes flashOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .click-text {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      pointer-events: none;
      z-index: 5;
      animation: clickTextUp 0.7s ease-out forwards;
      text-shadow: 0 0 10px var(--accent-glow-s);
    }

    @keyframes clickTextUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    /* Critical click — gold palette, exaggerated burst */
    .particle.crit {
      animation: particleExplodeCrit ease-out forwards;
      will-change: transform, opacity;
    }

    .particle.crit-shard {
      border-radius: 2px;
      animation: particleExplodeCritShard ease-out forwards;
      will-change: transform, opacity;
    }

    .particle.crit-ring {
      width: 40px;
      height: 40px;
      margin-left: -20px;
      margin-top: -20px;
      border-radius: 50%;
      background: transparent !important;
      border: 2px solid #ffd700;
      box-shadow: 0 0 20px #ffaa00;
      animation: critRingExpand 0.7s ease-out forwards;
      will-change: transform, opacity;
    }

    @keyframes particleExplodeCrit {
      0%   { opacity: 1; transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      60%  { opacity: 1; transform: translate3d(calc(var(--px) * 0.7), calc(var(--py) * 0.7), 0) scale(1.4) rotate(360deg); }
      100% { opacity: 0; transform: translate3d(var(--px), var(--py), 0) scale(0.3) rotate(720deg); }
    }

    @keyframes particleExplodeCritShard {
      0%   { opacity: 1; transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translate3d(var(--px), var(--py), 0) rotate(var(--spin, 540deg)) scale(0.1); }
    }

    @keyframes critRingExpand {
      0%   { opacity: 1; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(15); }
    }

    .counter.crit-bump {
      transform: scale(1.4);
      color: #fff3a0;
      text-shadow:
        0 0 30px #ffd700,
        0 0 80px #ffaa00,
        0 0 140px #ff8800;
    }

    .flash.crit {
      background: radial-gradient(circle at center, rgba(255, 215, 0, 0.55), rgba(255, 170, 0, 0.25) 60%, transparent 100%);
      animation: flashOutCrit 0.32s ease-out forwards;
    }

    @keyframes flashOutCrit {
      0%   { opacity: 1; }
      20%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .click-text.crit {
      font-size: clamp(2.4rem, 9vw, 5rem);
      color: #ffd700;
      text-shadow:
        0 0 20px #ffaa00,
        2px 2px 0 #000;
      letter-spacing: 0.08em;
      animation: critTextUp 1.1s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
      white-space: nowrap;
      -webkit-text-stroke: 1px #000;
      will-change: transform, opacity;
    }

    @keyframes critTextUp {
      0%   { opacity: 0; transform: translate(-50%, 20px) scale(0.3) rotate(-8deg); }
      15%  { opacity: 1; transform: translate(-50%, -10px) scale(1.6) rotate(4deg); }
      30%  { transform: translate(-50%, -30px) scale(1.2) rotate(-2deg); }
      55%  { transform: translate(-50%, -70px) scale(1.35) rotate(2deg); }
      100% { opacity: 0; transform: translate(-50%, -180px) scale(1.6) rotate(0deg); }
    }

    .crit-shake {
      animation: critShake 0.32s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes critShake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-8px, 4px) rotate(-0.8deg); }
      20% { transform: translate(7px, -5px) rotate(0.7deg); }
      30% { transform: translate(-6px, -3px) rotate(-0.6deg); }
      40% { transform: translate(5px, 5px) rotate(0.5deg); }
      50% { transform: translate(-4px, -4px) rotate(-0.4deg); }
      60% { transform: translate(4px, 3px) rotate(0.3deg); }
      70% { transform: translate(-3px, 2px) rotate(-0.2deg); }
      80% { transform: translate(2px, -2px) rotate(0.1deg); }
      90% { transform: translate(-1px, 1px) rotate(0deg); }
    }

    .streak-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent));
      z-index: 10;
      transition: width 0.1s ease;
      box-shadow: 0 0 15px var(--accent-glow-s);
    }

    .streak-label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px var(--accent-glow-s);
    }

    .streak-label.visible {
      opacity: 1;
    }

    .milestone {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      color: var(--accent);
      z-index: 20;
      pointer-events: none;
      text-shadow: 0 0 40px var(--accent-glow-s), 0 0 80px var(--accent-glow-m);
      animation: milestoneIn 1.2s ease-out forwards;
    }

    @keyframes milestoneIn {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.3) rotate(3deg); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) rotate(0deg); opacity: 0; }
    }

    .combo-text {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 4vw, 2rem);
      font-weight: 900;
      color: var(--combo);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      text-shadow: 0 0 20px var(--combo-glow);
    }

    .combo-text.visible {
      opacity: 1;
    }

    .reset-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .reset-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--modal-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }

    .reset-modal.open {
      display: flex;
    }

    .reset-box {
      background: var(--modal-box);
      border: 1px solid var(--modal-border);
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 0 60px var(--accent-glow-w);
      max-width: 340px;
      width: 90%;
    }

    .reset-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .reset-sub {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    .reset-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .reset-confirm, .reset-cancel {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-confirm {
      background: var(--accent);
      color: #fff;
    }

    .reset-confirm:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow-s);
    }

    .reset-cancel {
      background: transparent;
      color: var(--cancel-color);
      border: 1px solid var(--cancel-border);
    }

    .reset-cancel:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .top-btns {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .top-btns-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    @media (max-width: 520px) {
      .top-btns { top: 10px; right: 10px; gap: 4px; }
      .top-btns-row { gap: 5px; }
      .reset-btn, .lb-btn, .auto-btn {
        font-size: 0.75rem;
        padding: 8px 10px;
        min-width: 0;
      }
      .theme-btn, .song-btn { padding: 8px 12px; font-size: 1.1rem; }
    }

    .theme-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      line-height: 1;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .auto-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .auto-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .auto-btn.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .lb-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .lb-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Song picker (icon-only button + dropdown) */
    .song-picker {
      position: relative;
      display: inline-block;
    }

    .song-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      line-height: 1;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 13px 16px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .song-btn:hover, .song-btn.open {
      color: var(--accent);
      border-color: var(--accent);
    }

    .song-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 200px;
      background: var(--modal-box);
      border: 1px solid var(--accent-glow-m);
      border-radius: 10px;
      padding: 6px;
      z-index: 80;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 30px var(--accent-glow-w);
    }

    .song-menu.open {
      display: block;
    }

    .song-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: var(--text);
      background: transparent;
      border: none;
      border-radius: 6px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .song-option:hover {
      background: var(--accent-glow-w);
    }

    .song-option.active {
      color: var(--accent);
      background: var(--accent-glow-w);
    }

    .song-option .check {
      width: 14px;
      flex-shrink: 0;
      color: var(--accent);
      font-weight: 700;
    }

    .song-option .now-playing {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: var(--combo);
      letter-spacing: 0.05em;
      margin-left: 6px;
      opacity: 0.85;
    }

    /* What's New button & modal */
    .whats-new-btn {
      position: relative;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      line-height: 1;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--text-dim);
      border-radius: 8px;
      padding: 13px 16px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    async function checkForUpdate() {
      if (updateChecking) return;

      try {
        const url = window.location.pathname || '/';
        const sigOf = (h) => h.get('ETag') || h.get('Last-Modified') || h.get('Content-Length') || '';
        const [cachedRes, freshRes] = await Promise.all([
          fetch(url, { cache: 'force-cache' }),
          fetch(url + '?_=' + Date.now(), { cache: 'no-store' })
        ]);
        const cachedSig = sigOf(cachedRes.headers);
        const freshSig = sigOf(freshRes.headers);
        if (cachedSig && freshSig && cachedSig !== freshSig) {
          window.location.reload();
        }
      } catch (e) {
        // Offline or fetch failed — ignore
      } finally {
        updateChecking = false;
      }
    }
    // Check on launch (after a small delay so it doesn't fight the initial render)

    let currentSongIndex = 0;
    let randomMode = true; // Default for new users: Random shuffle
    try {
      const savedId = localStorage.getItem('phonkSong');
      if (savedId === 'random') {
        randomMode = true;
      } else if (savedId) {
        const idx = songs.findIndex(s => s.id === savedId);
        if (idx >= 0) {
          currentSongIndex = idx;
          randomMode = false;
        }
      }
    } catch (e) {}
    // If we're in random mode, kick off with a random song so first launch isn't always Batidão
    if (randomMode) currentSongIndex = Math.floor(Math.random() * songs.length);

    // Random mode: how many full 32-step loops a song plays before swapping.
    // Random within a range so the switch doesn't feel mechanical.
    let loopsThisSong = 0;
    let loopsUntilSwap = 3 + Math.floor(Math.random() * 3); // 3–5 loops

    function pickNextRandomSong() {
      if (songs.length <= 1) return;
      let next;
      do {
        next = Math.floor(Math.random() * songs.length);
      } while (next === currentSongIndex);
      currentSongIndex = next;
      loopsThisSong = 0;
      loopsUntilSwap = 3 + Math.floor(Math.random() * 3);
    }

    function makeDistortionCurve(amount) {
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    // Disconnect every node in `nodes` once `source` finishes playing.
    // Without this, gain/filter/distortion nodes stay rooted to destination
    // and accumulate over time, slowing the audio thread on long sessions.
    function cleanupOnEnd(source, nodes) {
      source.onended = () => {
        try { source.disconnect(); } catch (e) {}
        for (const n of nodes) {
          try { n.disconnect(); } catch (e) {}
        }
      };
    }

    function playKick(now) {
      // Punchy batidão kick
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
      gain.gain.setValueAtTime(0.8, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.25);
      cleanupOnEnd(osc, [gain]);

      // Click transient for punch
      const click = audioCtx.createOscillator();
      const cGain = audioCtx.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(1000, now);
      click.frequency.exponentialRampToValueAtTime(200, now + 0.015);
      cGain.gain.setValueAtTime(0.3, now);
      cGain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
      click.connect(cGain); cGain.connect(audioCtx.destination);
      click.start(now); click.stop(now + 0.02);
      cleanupOnEnd(click, [cGain]);
    }

    function playSnare(now) {
      // Clap-style snare (Brazilian phonk clap)
      for (let i = 0; i < 3; i++) {
        const offset = now + i * 0.008;
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1);
        const noise = audioCtx.createBufferSource();
        const nGain = audioCtx.createGain();
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 0.8;
        noise.buffer = buf;
        nGain.gain.setValueAtTime(0.35, offset);
        nGain.gain.exponentialRampToValueAtTime(0.001, offset + 0.08);
        noise.connect(bp); bp.connect(nGain); nGain.connect(audioCtx.destination);
        noise.start(offset);
        cleanupOnEnd(noise, [bp, nGain]);
      }
      // Tonal body
      const osc = audioCtx.createOscillator();
      const oGain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(250, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      oGain.gain.setValueAtTime(0.3, now);
      oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(oGain); oGain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.08);
      cleanupOnEnd(osc, [oGain]);
    }

    function playHiHat(now, open) {
      const dur = open ? 0.14 : 0.035;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);

      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);

      const gain = audioCtx.createGain();

      hp.type = 'highpass'; hp.frequency.value = open ? 7000 : 9000;

      gain.gain.setValueAtTime(open ? 0.15 : 0.10, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      noise.connect(hp); hp.connect(gain); gain.connect(audioCtx.destination);
      noise.start(now);
      cleanupOnEnd(noise, [hp, gain]);
    }

    function playCowbell(now) {
      // Loud metallic cowbell — signature batidão sound
      const freqs = [587.3, 845];
      freqs.forEach(f => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = f; bp.Q.value = 12;
        osc.type = 'square';
        osc.frequency.setValueAtTime(f, now);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.connect(bp); bp.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.06);
        cleanupOnEnd(osc, [bp, gain]);
      });
      // Extra click transient for attack
      const click = audioCtx.createOscillator();
      const cg = audioCtx.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(2000, now);

      cg.gain.exponentialRampToValueAtTime(0.001, now + 0.01);
      click.connect(cg); cg.connect(audioCtx.destination);
      click.start(now); click.stop(now + 0.01);
      cleanupOnEnd(click, [cg]);
    }

    function playBass(now, freq, slide) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(200);

      // Start higher and slide down for that 808 glide
      const startFreq = freq * Math.pow(2, slide / 12);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(startFreq, now);
      osc.frequency.exponentialRampToValueAtTime(freq, now + 0.12);

      gain.gain.setValueAtTime(0.6, now);
      gain.gain.setValueAtTime(0.5, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

      osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.35);
      cleanupOnEnd(osc, [dist, gain]);

      // Sub layer for extra weight
      const sub = audioCtx.createOscillator();
      const subG = audioCtx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(freq * 0.5, now);
      subG.gain.setValueAtTime(0.3, now);
      subG.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      sub.connect(subG); subG.connect(audioCtx.destination);
      sub.start(now); sub.stop(now + 0.3);
      cleanupOnEnd(sub, [subG]);
    }

    function playMelodyNote(now, freq, dur) {
      // Aggressive staccato lead — punchy and distorted like phonk synths
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(80);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(4000, now);
      filter.frequency.exponentialRampToValueAtTime(1200, now + dur);
      filter.Q.value = 6;

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.16, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(dist); dist.connect(filter); filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + dur);
      cleanupOnEnd(osc, [dist, filter, gain]);

      // Detuned layer for thickness
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(freq * 0.998, now);
      g2.gain.setValueAtTime(0.08, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc2.connect(g2); g2.connect(audioCtx.destination);
      osc2.start(now); osc2.stop(now + dur);
      cleanupOnEnd(osc2, [g2]);

      // Sub octave for weight
      const osc3 = audioCtx.createOscillator();
      const g3 = audioCtx.createGain();
      osc3.type = 'sine';
      osc3.frequency.setValueAtTime(freq * 0.5, now);
      g3.gain.setValueAtTime(0.06, now);
      g3.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.8);
      osc3.connect(g3); g3.connect(audioCtx.destination);
      osc3.start(now); osc3.stop(now + dur);
      cleanupOnEnd(osc3, [g3]);
    }

    function playPhonkSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const step = beatStep % 32;
      // Random mode: count loops; once the song has repeated enough times, swap
      if (step === 0 && beatStep > 0 && randomMode) {
        loopsThisSong++;
        if (loopsThisSong >= loopsUntilSwap) {
          pickNextRandomSong();
          if (typeof renderSongMenu === 'function') renderSongMenu();
        }
      }
      beatStep++;
      const song = songs[currentSongIndex];

      // Drums
      const drum = song.drums[step];
      if (drum === 'K') playKick(now);
      else if (drum === 'S') playSnare(now);
      else if (drum === 'H') playHiHat(now, false);
      else if (drum === 'O') playHiHat(now, true);
      else if (drum === 'C') playCowbell(now);

      // 808 bass with slide
      const bassFreq = song.bass[step];
      if (bassFreq > 0) playBass(now, bassFreq, song.bassSlide[step]);

      // Melody
      const mel = song.melody[step];
      if (mel.n > 0) playMelodyNote(now, mel.n, mel.d);
    }

    function spawnParticles(x, y, isCrit) {
      const normalColors = ['#ff0050', '#ff3377', '#ff5599', '#ffaa00', '#ffffff', '#ff0033'];
      const critColors = ['#ffd700', '#ffaa00', '#fff3a0', '#ffffff', '#ff8800', '#ffe066'];
      const colors = isCrit ? critColors : normalColors;
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      let baseCount = isCrit
        ? 32 + Math.min(streak, 16)
        : 10 + Math.min(streak * 2, 30);
      // Cap concurrent particles so rapid bursts don't stack into jank
      const live = particlesEl.childElementCount;
      const headroom = Math.max(0, 80 - live);
      if (baseCount > headroom) baseCount = headroom;
      const frag = document.createDocumentFragment();
      const created = [];
      for (let i = 0; i < baseCount; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const isShard = isCrit && (i % 3 === 0);
        if (isCrit) {
          p.classList.add('crit');
          if (isShard) p.classList.add('crit-shard');
        }
        const size = isCrit ? Math.random() * 14 + 6 : Math.random() * 10 + 3;
        const angle = (Math.PI * 2 * i) / baseCount + (Math.random() - 0.5) * 0.4;
        const reachMult = isCrit ? 0.5 + Math.random() * 0.6 : 0.3 + Math.random() * 0.5;
        const reach = reachMult * Math.max(screenW, screenH);
        const px = Math.cos(angle) * reach;
        const py = Math.sin(angle) * reach;
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = color;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.setProperty('--px', px + 'px');
        p.style.setProperty('--py', py + 'px');
        if (isShard) {
          p.style.setProperty('--spin', (360 + Math.random() * 720) * (Math.random() < 0.5 ? -1 : 1) + 'deg');
        }
        // Smaller blur radii are dramatically cheaper to rasterize on iOS Safari
        p.style.boxShadow = `0 0 ${size * (isCrit ? 2 : 3)}px ${color}`;
        p.style.animationDuration = isCrit
          ? (Math.random() * 0.4 + 0.8) + 's'
          : (Math.random() * 0.6 + 0.5) + 's';
        frag.appendChild(p);
        created.push(p);
      }
      particlesEl.appendChild(frag);
      const lifetime = isCrit ? 1400 : 1200;
      setTimeout(() => { for (const p of created) p.remove(); }, lifetime);

      if (isCrit) {
        const ring = document.createElement('div');
        ring.className = 'particle crit-ring';
        ring.style.left = x + 'px';
        ring.style.top = y + 'px';
        particlesEl.appendChild(ring);
        setTimeout(() => ring.remove(), 750);

        setTimeout(() => {
          const ring2 = document.createElement('div');
          ring2.className = 'particle crit-ring';
          ring2.style.left = x + 'px';
          ring2.style.top = y + 'px';
          particlesEl.appendChild(ring2);
          setTimeout(() => ring2.remove(), 750);
        }, 120);
      }
    }

        const comboTier2 = ['ON FIRE', 'BEAST MODE', 'TURBO', 'MEGA', 'HYPED', 'CRACKED', 'GOATED', 'NO CAP', 'BUSSIN', 'ZOOMING', 'ELITE', 'SAVAGE', 'AMPED', 'COOKING', 'INSANE', 'LEGEND', 'SAUCY', 'CLUTCH', 'DEMON MODE', 'LOCKED IN FR'];
        const comboTier3 = ['GODLIKE', 'ASCENDED', 'MYTHICAL', 'TRANSCENDED', 'GALAXY BRAIN', 'FINAL BOSS', 'PHONK LORD', 'ACTUALLY INSANE', 'BUILT DIFFERENT', 'MAIN CHARACTER', 'GOAT STATUS', 'MAXED OUT', 'GOD TIER', 'BOSS LEVEL', 'ULTRA INSTINCT', 'PRESTIGE', 'S TIER', 'RIZZ LORD', 'ANIME ARC', 'PEAK PERFORMANCE'];
        const comboTier4 = ['UNSTOPPABLE', 'INFINITE POWER', 'BEYOND GODLIKE', 'OFF THE CHARTS', 'PHONK DEITY', 'CLICK WIZARD', 'ARE YOU OK??', 'SOMEONE STOP THEM', 'THIS IS ILLEGAL', 'WORLD RECORD PACE', 'ABSOLUTE UNIT', 'NOT EVEN FAIR', 'BREAKING REALITY', 'FINGERS OF FURY', 'TOO POWERFUL', 'MAXIMUM OVERDRIVE', 'GOING NUCLEAR', 'LIGHT SPEED', 'REALITY CHECK', 'CERTIFIED MANIAC'];
        const pick = arr => arr[Math.floor(Math.random() * arr.length)];
        comboText.textContent = streak >= 20 ? pick(comboTier4) : streak >= 15 ? pick(comboTier3) : streak >= 10 ? pick(comboTier2) : pick(comboTier1);
        comboText.classList.add('visible');
        comboText.style.transform = `translateX(-50%) scale(${1 + streak * 0.02})`;
      }

      clearTimeout(streakTimer);
      streakTimer = setTimeout(() => {
        streak = 0;
        streakBar.style.width = '0%';
        streakLabel.classList.remove('visible');
        comboText.classList.remove('visible');
      }, 1200);

    // Rate limit: 50ms = max 20 CPS, well above any legitimate human click rate.
    // Defends against auto-fire mice, auto-clicker extensions, and DevTools spam
    // — every code path eventually flows through handleClick.
    let lastClickAt = 0;
    const MIN_CLICK_INTERVAL_MS = 50;

    function handleClick(e) {
      const now = performance.now();
      if (now - lastClickAt < MIN_CLICK_INTERVAL_MS) return;
      lastClickAt = now;

      initAudio();
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 120);
      const isCrit = Math.random() < 0.03;
      const gained = isCrit ? 10 : 1;

      // Bump animation

      counterEl.classList.add(bumpClass);
      setTimeout(() => counterEl.classList.remove(bumpClass), isCrit ? 260 : 100);

      // Effects
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      updateStreak();
      playPhonkSound();
      spawnParticles(cx, cy, isCrit);
      showClickText(cx, cy, isCrit);
      showFlash(isCrit);
      if (isCrit) triggerCritShake();

      // Milestones — scan the range we crossed so crits don't skip milestones
      const milestones = { 10: 'WARMING UP!', 25: 'GETTING HYPE!', 50: 'HALFWAY LIT!', 100: '100 HITS!', 250: 'BEAST MODE!', 500: 'LEGENDARY!', 1000: 'PHONK GOD!' };
      for (let c = prevCount + 1; c <= count; c++) {
        if (milestones[c]) {
          showMilestone(milestones[c]);
          break;
        }
      }

      // Sync score to leaderboard
      debouncedSubmit();

      // Hue shift at milestones — fire if any multiple of 100 was crossed
      if (Math.floor(count / 100) > Math.floor(prevCount / 100)) {
        document.body.style.transition = 'background 0.5s';
        document.body.style.background = getComputedStyle(document.body).getPropertyValue('--bg-alt');
        setTimeout(() => { document.body.style.background = ''; }, 500);
      }
    }

    } else {
      showPlayerTag();
      // Real-time sync — picks up higher score from other tabs/devices
      listenToOwnScore();
    }

    // New player registration
    document.getElementById('welcomeSubmit').addEventListener('click', () => {
      const rawName = document.getElementById('nameInput').value;
      const name = sanitizeName(rawName);
      const pin = document.getElementById('pinInput').value;
      const errEl = document.getElementById('welcomeError');
      clearWelcomeError(errEl);

      if (hasEmoji(rawName)) { showWelcomeError(errEl, 'No emoji in usernames!'); return; }
      if (!name) { showWelcomeError(errEl, 'Enter a username!'); return; }
      if (!/^\d{4}$/.test(pin)) { showWelcomeError(errEl, 'PIN must be 4 digits!'); return; }

      const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!key) { showWelcomeError(errEl, 'Invalid username!'); return; }

      const ref = db.ref('players/' + key);
      ref.once('value', snap => {
        if (snap.exists()) {
          showWelcomeError(errEl, 'Username already taken!');
          return;
        }
        ref.set({
          name: name,
          pin: pin,
          score: count,
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
          playerName = name;
          playerPin = pin;
          playerKey = key;
          localStorage.setItem('phonkPlayerName', name);
          localStorage.setItem('phonkPlayerPin', pin);
          welcomeModal.classList.remove('open');
          showPlayerTag();
          listenToOwnScore();
          track('sign_up', { method: 'pin' });
        }).catch(() => {
          showWelcomeError(errEl, 'Something went wrong!');
        });
      });
    });

    // Sign in (cross-device)
    document.getElementById('loginSubmit').addEventListener('click', () => {
      const rawName = document.getElementById('loginNameInput').value;
      const name = sanitizeName(rawName);
      const pin = document.getElementById('loginPinInput').value;
      const errEl = document.getElementById('loginError');
      clearWelcomeError(errEl);

      if (hasEmoji(rawName)) { showWelcomeError(errEl, 'No emoji in usernames!'); return; }
      if (!name) { showWelcomeError(errEl, 'Enter your username!'); return; }
      if (!/^\d{4}$/.test(pin)) { showWelcomeError(errEl, 'PIN must be 4 digits!'); return; }

      const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!key) { showWelcomeError(errEl, 'Invalid username!'); return; }

      const ref = db.ref('players/' + key);
      ref.once('value', snap => {
        if (!snap.exists()) {
          showWelcomeError(errEl, 'Username not found!');
          return;
        }
        // Try updating — Firebase rules will reject if PIN doesn't match
        ref.update({
          pin: pin,
          score: Math.max(count, snap.val().score || 0),
          updatedAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
          playerName = snap.val().name;
          playerPin = pin;
          playerKey = key;
          // Load remote score
          const remote = snap.val().score || 0;
          if (remote > count) {
            count = remote;
            counterEl.textContent = count.toLocaleString();
          }
          localStorage.setItem('phonkPlayerName', playerName);
          localStorage.setItem('phonkPlayerPin', pin);
          welcomeModal.classList.remove('open');
          showPlayerTag();
          listenToOwnScore();
          track('login', { method: 'pin' });
        }).catch(() => {
          showWelcomeError(errEl, 'Wrong PIN!');
          track('login_failed');
        });
      });
    });

    // Sync score to Firebase — uses transaction to prevent stale tabs overwriting higher scores
    function flushScore() {
      if (!playerName || !playerKey) return;
      db.ref('players/' + playerKey).transaction(current => {
        if (current === null) {
          return { name: playerName, pin: playerPin, score: count, updatedAt: firebase.database.ServerValue.TIMESTAMP };
        }
        if (count > (current.score || 0)) {
          current.score = count;
          current.pin = playerPin;
          current.updatedAt = firebase.database.ServerValue.TIMESTAMP;
          return current;
        }
        return;
      });
    }

    // Debounced auto-sync (5 seconds)
    let submitTimer = null;
    function debouncedSubmit() {
      if (!playerName || !playerKey) return;
      clearTimeout(submitTimer);
      submitTimer = setTimeout(flushScore, 5000);
    }

    // Real-time listener on own score — keeps local count in sync across tabs/devices
    function listenToOwnScore() {
      if (!playerKey) return;
      db.ref('players/' + playerKey + '/score').on('value', snap => {
        const remote = snap.val();
        if (remote != null && remote > count) {
          count = remote;
          counterEl.textContent = count.toLocaleString();
        }
      });
    }

    // Leaderboard modal — flush score + auto-scroll to player's row on open
    const lbMyRank = document.getElementById('lbMyRank');
    lbBtn.addEventListener('click', () => {
      // Flush any pending score so leaderboard is instantly up to date
      clearTimeout(submitTimer);
      flushScore();
      lbModal.classList.add('open');
      setTimeout(() => {
        const myRow = lbList.querySelector('.lb-me');
        if (myRow) myRow.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }, 50);
      track('leaderboard_open', { score: count });
    });
    lbClose.addEventListener('click', () => { lbModal.classList.remove('open'); });
    lbModal.addEventListener('click', (e) => { if (e.target === lbModal) lbModal.classList.remove('open'); });

    // Live activity toasts
    const toastContainer = document.getElementById('toastContainer');
    const prevScores = {};
    const milestones = [100, 250, 500, 1000, 2500, 5000, 10000, 25000, 50000, 100000, 250000, 500000, 1000000];

    function getMilestoneCrossed(oldScore, newScore) {
      for (let i = milestones.length - 1; i >= 0; i--) {
        if (newScore >= milestones[i] && oldScore < milestones[i]) return milestones[i];
      }
      return null;
    }

    function showToast(name, milestone, isSelf) {
      const el = document.createElement('div');
      el.className = 'toast';
      const formatted = milestone >= 1000 ? (milestone / 1000) + 'K' : milestone.toLocaleString();
      if (isSelf) {
        el.innerHTML = '<span class="toast-icon">\uD83C\uDF89</span><span class="toast-name">YOU</span> hit <span class="toast-milestone">' + formatted + '!</span>';
      } else {
        el.innerHTML = '<span class="toast-icon">\uD83D\uDD25</span><span class="toast-name">' + escapeHtml(name) + '</span> hit <span class="toast-milestone">' + formatted + '!</span>';
      }
      toastContainer.appendChild(el);
      // Remove after animation completes
      setTimeout(() => el.remove(), 3600);
      // Cap visible toasts at 3
      while (toastContainer.children.length > 3) {
        toastContainer.firstChild.remove();
      }
    }

    function timeAgo(ts) {
      if (!ts) return '';
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 30) return 'just now';
      if (s < 60) return s + 's ago';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      const d = Math.floor(h / 24);
      if (d < 7) return d + 'd ago';
      return Math.floor(d / 7) + 'w ago';
    }

    // Real-time leaderboard listener (top 25)
    const lbPodium = document.getElementById('lbPodium');
    db.ref('players').orderByChild('score').limitToLast(50).on('value', snap => {
      const entries = [];
      snap.forEach(child => {
        const d = child.val();
        entries.push({ key: child.key, name: d.name || child.key, score: d.score || 0, updatedAt: d.updatedAt || 0 });
      });
      entries.sort((a, b) => b.score - a.score);

      // Detect milestone crossings → show toast
      entries.forEach(e => {
        const old = prevScores[e.key];
        if (old != null) { // skip first load
          const milestone = getMilestoneCrossed(old, e.score);
          if (milestone) {
            showToast(e.name, milestone, e.key === playerKey);
            if (e.key === playerKey) {
              track('milestone_reached', { milestone: milestone });
            }
          }
        }
        prevScores[e.key] = e.score;
      });

      if (entries.length === 0) {
        lbPodium.innerHTML = '';
        lbList.innerHTML = '<div class="lb-empty">NO SCORES YET</div>';
        lbMyRank.style.display = 'none';
        return;
      }

      // Find player's rank
      const myIndex = entries.findIndex(e => e.key === playerKey);
      const youBadge = '<span class="lb-you-badge">YOU</span>';

      // Top 3 podium cards (order: silver, gold, bronze via CSS)
      const medals = ['🥇', '🥈', '🥉'];
      const classes = ['gold', 'silver', 'bronze'];
      const top3 = entries.slice(0, 3);
      lbPodium.innerHTML = top3.map((e, i) => {
        const isMe = e.key === playerKey;
        return '<div class="lb-podium-card ' + classes[i] + (isMe ? ' lb-me' : '') + '">' +
          '<span class="lb-podium-medal">' + medals[i] + '</span>' +
          '<div class="lb-podium-name">' + escapeHtml(e.name) + '</div>' +
          '<div class="lb-podium-score">' + e.score.toLocaleString() + '</div>' +
          (e.updatedAt ? '<div class="lb-time">' + timeAgo(e.updatedAt) + '</div>' : '') +
          '</div>';
      }).join('');

      // Rest of the list (rank 4+)
      const rest = entries.slice(3);
      if (rest.length === 0) {
        lbList.innerHTML = '';
      } else {
        lbList.innerHTML = rest.map((e, i) => {
          const isMe = e.key === playerKey;
          const rank = i + 4;
          return '<div class="lb-row' + (isMe ? ' lb-me' : '') + '">' +
            '<span class="lb-rank">' + rank + '</span>' +
            '<span class="lb-name">' + escapeHtml(e.name) + (isMe ? ' ' + youBadge : '') + '</span>' +
            (e.updatedAt ? '<span class="lb-time">' + timeAgo(e.updatedAt) + '</span>' : '') +
            '<span class="lb-score">' + e.score.toLocaleString() + '</span>' +
            '</div>';
        }).join('');
      }

      // Hide the old sticky rank bar — user is highlighted in-place with YOU badge
      lbMyRank.style.display = 'none';
    });
  </script>
</body>
</html>
