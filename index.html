<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHONK CLICKER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,0,80,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,80,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) scale(0); }
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #ff0050;
      text-shadow:
        0 0 20px rgba(255,0,80,0.5),
        0 0 60px rgba(255,0,80,0.3),
        0 0 100px rgba(255,0,80,0.1);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      z-index: 2;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255,0,80,0.5), 0 0 60px rgba(255,0,80,0.3); }
      50% { text-shadow: 0 0 30px rgba(255,0,80,0.8), 0 0 80px rgba(255,0,80,0.5), 0 0 120px rgba(255,0,80,0.2); }
    }

    .counter {
      font-size: clamp(3rem, 15vw, 10rem);
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.3),
        0 0 60px rgba(255,0,80,0.2);
      z-index: 2;
      transition: transform 0.1s ease;
      line-height: 1;
      margin-bottom: 2rem;
    }

    .counter.bump {
      transform: scale(1.15);
    }

    .subtitle {
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      z-index: 2;
    }

    .btn-wrapper {
      z-index: 2;
      position: relative;
    }

    .click-btn {
      position: relative;
      width: clamp(160px, 40vw, 220px);
      height: clamp(160px, 40vw, 220px);
      border-radius: 50%;
      border: 3px solid #ff0050;
      background: radial-gradient(circle at 35% 35%, #2a0015, #150008);
      color: #ff0050;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0.15em;
      cursor: pointer;
      outline: none;
      transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.08s ease;
      box-shadow:
        0 0 30px rgba(255,0,80,0.3),
        0 0 60px rgba(255,0,80,0.1),
        inset 0 0 30px rgba(255,0,80,0.1);
      -webkit-tap-highlight-color: transparent;
    }

    .click-btn::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(255,0,80,0.2);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .click-btn::after {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(255,0,80,0.1);
      animation: ringPulse 2s ease-in-out infinite 0.5s;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.4; }
    }

    .click-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 50px rgba(255,0,80,0.5),
        0 0 100px rgba(255,0,80,0.2),
        inset 0 0 40px rgba(255,0,80,0.2);
      border-color: #ff3377;
    }

    .click-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 0 80px rgba(255,0,80,0.8),
        0 0 150px rgba(255,0,80,0.3),
        inset 0 0 60px rgba(255,0,80,0.3);
      border-color: #ff5599;
      background: radial-gradient(circle at 35% 35%, #3d001f, #1f000d);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 80, 0.06);
      pointer-events: none;
      z-index: 10;
      animation: flashOut 0.15s ease-out forwards;
    }

    @keyframes flashOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .click-text {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: #ff0050;
      pointer-events: none;
      z-index: 5;
      animation: clickTextUp 0.7s ease-out forwards;
      text-shadow: 0 0 10px rgba(255,0,80,0.8);
    }

    @keyframes clickTextUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    .streak-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #ff0050, #ff3377, #ff0050);
      z-index: 10;
      transition: width 0.1s ease;
      box-shadow: 0 0 15px rgba(255,0,80,0.8);
    }

    .streak-label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: #ff0050;
      letter-spacing: 0.2em;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px rgba(255,0,80,0.5);
    }

    .streak-label.visible {
      opacity: 1;
    }

    .milestone {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      color: #ff0050;
      z-index: 20;
      pointer-events: none;
      text-shadow: 0 0 40px rgba(255,0,80,0.8), 0 0 80px rgba(255,0,80,0.4);
      animation: milestoneIn 1.2s ease-out forwards;
    }

    @keyframes milestoneIn {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.3) rotate(3deg); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) rotate(0deg); opacity: 0; }
    }

    .combo-text {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 4vw, 2rem);
      font-weight: 900;
      color: #ffaa00;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      text-shadow: 0 0 20px rgba(255,170,0,0.8);
    }

    .combo-text.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="vignette"></div>
  <div class="particles" id="particles"></div>

  <div class="subtitle">TOTAL CLICKS</div>
  <div class="counter" id="counter">0</div>
  <div class="title">PHONK CLICKER</div>

  <div class="btn-wrapper">
    <button class="click-btn" id="clickBtn">HIT IT</button>
  </div>

  <div class="streak-bar" id="streakBar" style="width: 0%"></div>
  <div class="streak-label" id="streakLabel"></div>
  <div class="combo-text" id="comboText"></div>

  <script>
    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('clickBtn');
    const particlesEl = document.getElementById('particles');
    const streakBar = document.getElementById('streakBar');
    const streakLabel = document.getElementById('streakLabel');
    const comboText = document.getElementById('comboText');

    let count = parseInt(localStorage.getItem('phonkClicks') || '0');
    let streak = 0;
    let streakTimer = null;
    let lastClickTime = 0;
    let audioCtx = null;

    counterEl.textContent = count.toLocaleString();

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // 32-step NO BATIDÃO style sequence
    // Key: Fm, 130 BPM, progression: Fm → Db → Bbm → C
    let beatStep = 0;

    // Melody — F minor, hypnotic staccato hook following the chord progression
    const melodyPattern = [
      // Bar 1: Fm (F Ab C) — punchy descending hook
      { n: 349.2, d: 0.08 },  // F4
      { n: 523.3, d: 0.08 },  // C5
      { n: 415.3, d: 0.12 },  // Ab4
      { n: 0 },
      { n: 349.2, d: 0.08 },  // F4
      { n: 415.3, d: 0.08 },  // Ab4
      { n: 349.2, d: 0.15 },  // F4
      { n: 0 },
      // Bar 2: Db (Db F Ab) — response, higher energy
      { n: 554.4, d: 0.08 },  // Db5
      { n: 415.3, d: 0.08 },  // Ab4
      { n: 349.2, d: 0.12 },  // F4
      { n: 0 },
      { n: 415.3, d: 0.08 },  // Ab4
      { n: 554.4, d: 0.08 },  // Db5
      { n: 415.3, d: 0.15 },  // Ab4
      { n: 0 },
      // Bar 3: Bbm (Bb Db F) — darker, building tension
      { n: 466.2, d: 0.08 },  // Bb4
      { n: 349.2, d: 0.08 },  // F4
      { n: 277.2, d: 0.12 },  // Db4
      { n: 0 },
      { n: 349.2, d: 0.08 },  // F4
      { n: 466.2, d: 0.08 },  // Bb4
      { n: 349.2, d: 0.15 },  // F4
      { n: 0 },
      // Bar 4: C (C E G) — resolve, bright lift
      { n: 523.3, d: 0.08 },  // C5
      { n: 392.0, d: 0.08 },  // G4
      { n: 329.6, d: 0.12 },  // E4
      { n: 0 },
      { n: 392.0, d: 0.08 },  // G4
      { n: 523.3, d: 0.10 },  // C5
      { n: 392.0, d: 0.15 },  // G4
      { n: 0 },
    ];

    // 808 bass — root notes with heavy slides following Fm → Db → Bbm → C
    const bassPattern = [
      // Bar 1: Fm root = F
      87.3, 0, 0, 87.3,  0, 87.3, 0, 0,
      // Bar 2: Db root = Db
      69.3, 0, 0, 69.3,  0, 0, 69.3, 0,
      // Bar 3: Bbm root = Bb
      58.3, 0, 58.3, 0,  0, 58.3, 0, 0,
      // Bar 4: C root = C
      65.4, 0, 0, 65.4,  0, 0, 65.4, 65.4,
    ];

    // Bass slide amount (semitones to glide down from)
    const bassSlide = [
      7, 0, 0, 4,  0, 5, 0, 0,
      7, 0, 0, 4,  0, 0, 5, 0,
      7, 0, 5, 0,  0, 4, 0, 0,
      5, 0, 0, 4,  0, 0, 5, 8,
    ];

    // Drum pattern: K=kick, H=hat, C=cowbell, S=snare/clap, O=open hat
    // Batidão bounce — syncopated with cowbell driving the groove
    const drumPattern = [
      'K', 'C', 'H', 'C',  'S', 'C', 'H', 'K',
      'C', 'H', 'C', 'K',  'S', 'C', 'O', 'C',
      'K', 'C', 'H', 'C',  'S', 'C', 'K', 'H',
      'C', 'K', 'C', 'H',  'S', 'C', 'O', 'K',
    ];

    function makeDistortionCurve(amount) {
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) {
        const x = (i * 2) / 256 - 1;
        curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    function playKick(now) {
      // Punchy batidão kick
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
      gain.gain.setValueAtTime(0.8, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.25);

      // Click transient for punch
      const click = audioCtx.createOscillator();
      const cGain = audioCtx.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(1000, now);
      click.frequency.exponentialRampToValueAtTime(200, now + 0.015);
      cGain.gain.setValueAtTime(0.3, now);
      cGain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
      click.connect(cGain); cGain.connect(audioCtx.destination);
      click.start(now); click.stop(now + 0.02);
    }

    function playSnare(now) {
      // Clap-style snare (Brazilian phonk clap)
      for (let i = 0; i < 3; i++) {
        const offset = now + i * 0.008;
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1);
        const noise = audioCtx.createBufferSource();
        const nGain = audioCtx.createGain();
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 0.8;
        noise.buffer = buf;
        nGain.gain.setValueAtTime(0.35, offset);
        nGain.gain.exponentialRampToValueAtTime(0.001, offset + 0.08);
        noise.connect(bp); bp.connect(nGain); nGain.connect(audioCtx.destination);
        noise.start(offset);
      }
      // Tonal body
      const osc = audioCtx.createOscillator();
      const oGain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(250, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      oGain.gain.setValueAtTime(0.3, now);
      oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(oGain); oGain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.08);
    }

    function playHiHat(now, open) {
      const dur = open ? 0.14 : 0.035;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const noise = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = open ? 7000 : 9000;
      noise.buffer = buf;
      gain.gain.setValueAtTime(open ? 0.15 : 0.10, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      noise.connect(hp); hp.connect(gain); gain.connect(audioCtx.destination);
      noise.start(now);
    }

    function playCowbell(now) {
      // Loud metallic cowbell — signature batidão sound
      const freqs = [587.3, 845];
      freqs.forEach(f => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = f; bp.Q.value = 12;
        osc.type = 'square';
        osc.frequency.setValueAtTime(f, now);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.connect(bp); bp.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.06);
      });
      // Extra click transient for attack
      const click = audioCtx.createOscillator();
      const cg = audioCtx.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(2000, now);
      cg.gain.setValueAtTime(0.15, now);
      cg.gain.exponentialRampToValueAtTime(0.001, now + 0.01);
      click.connect(cg); cg.connect(audioCtx.destination);
      click.start(now); click.stop(now + 0.01);
    }

    function playBass(now, freq, slide) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(200);

      // Start higher and slide down for that 808 glide
      const startFreq = freq * Math.pow(2, slide / 12);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(startFreq, now);
      osc.frequency.exponentialRampToValueAtTime(freq, now + 0.12);

      gain.gain.setValueAtTime(0.6, now);
      gain.gain.setValueAtTime(0.5, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

      osc.connect(dist); dist.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.35);

      // Sub layer for extra weight
      const sub = audioCtx.createOscillator();
      const subG = audioCtx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(freq * 0.5, now);
      subG.gain.setValueAtTime(0.3, now);
      subG.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      sub.connect(subG); subG.connect(audioCtx.destination);
      sub.start(now); sub.stop(now + 0.3);
    }

    function playMelodyNote(now, freq, dur) {
      // Aggressive staccato lead — punchy and distorted like phonk synths
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const dist = audioCtx.createWaveShaper();
      dist.curve = makeDistortionCurve(80);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(4000, now);
      filter.frequency.exponentialRampToValueAtTime(1200, now + dur);
      filter.Q.value = 6;

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.16, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(dist); dist.connect(filter); filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + dur);

      // Detuned layer for thickness
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(freq * 0.998, now);
      g2.gain.setValueAtTime(0.08, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc2.connect(g2); g2.connect(audioCtx.destination);
      osc2.start(now); osc2.stop(now + dur);

      // Sub octave for weight
      const osc3 = audioCtx.createOscillator();
      const g3 = audioCtx.createGain();
      osc3.type = 'sine';
      osc3.frequency.setValueAtTime(freq * 0.5, now);
      g3.gain.setValueAtTime(0.06, now);
      g3.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.8);
      osc3.connect(g3); g3.connect(audioCtx.destination);
      osc3.start(now); osc3.stop(now + dur);
    }

    function playPhonkSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const step = beatStep % 32;
      beatStep++;

      // Drums
      const drum = drumPattern[step];
      if (drum === 'K') playKick(now);
      else if (drum === 'S') playSnare(now);
      else if (drum === 'H') playHiHat(now, false);
      else if (drum === 'O') playHiHat(now, true);
      else if (drum === 'C') playCowbell(now);

      // 808 bass with slide
      const bassFreq = bassPattern[step];
      if (bassFreq > 0) playBass(now, bassFreq, bassSlide[step]);

      // Melody
      const mel = melodyPattern[step];
      if (mel.n > 0) playMelodyNote(now, mel.n, mel.d);
    }

    function spawnParticles(x, y) {
      const colors = ['#ff0050', '#ff3377', '#ff5599', '#ffaa00', '#ffffff'];
      const count = 6 + Math.min(streak, 15);
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 8 + 3;
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5);
        const dist = Math.random() * 80 + 30;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = (x + Math.cos(angle) * dist) + 'px';
        p.style.top = (y + Math.sin(angle) * dist) + 'px';
        p.style.boxShadow = `0 0 ${size * 2}px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 0.5 + 0.4) + 's';
        particlesEl.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    function showClickText(x, y) {
      const texts = ['+1', 'BOOM', 'FIRE', 'YO!', 'HARD', 'BANG', 'SHEESH', 'W', 'LET\'S GO'];
      const el = document.createElement('div');
      el.className = 'click-text';
      el.textContent = streak > 3 ? texts[Math.floor(Math.random() * texts.length)] : '+1';
      el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = (y - 30) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }

    function showFlash() {
      const flash = document.createElement('div');
      flash.className = 'flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 150);
    }

    function showMilestone(text) {
      const el = document.createElement('div');
      el.className = 'milestone';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function updateStreak() {
      const now = Date.now();
      const timeSinceLast = now - lastClickTime;
      lastClickTime = now;

      if (timeSinceLast < 500) {
        streak++;
      } else if (timeSinceLast < 1000) {
        streak = Math.max(1, streak);
      } else {
        streak = 1;
      }

      const pct = Math.min(streak / 20, 1) * 100;
      streakBar.style.width = pct + '%';

      if (streak >= 3) {
        streakLabel.textContent = `${streak}x STREAK`;
        streakLabel.classList.add('visible');
      }

      if (streak >= 5) {
        comboText.textContent = streak >= 20 ? 'UNSTOPPABLE' : streak >= 15 ? 'GODLIKE' : streak >= 10 ? 'ON FIRE' : 'COMBO';
        comboText.classList.add('visible');
        comboText.style.transform = `translateX(-50%) scale(${1 + streak * 0.02})`;
      }

      clearTimeout(streakTimer);
      streakTimer = setTimeout(() => {
        streak = 0;
        streakBar.style.width = '0%';
        streakLabel.classList.remove('visible');
        comboText.classList.remove('visible');
      }, 1200);
    }

    function handleClick(e) {
      initAudio();
      count++;
      localStorage.setItem('phonkClicks', count.toString());
      counterEl.textContent = count.toLocaleString();

      // Bump animation
      counterEl.classList.add('bump');
      setTimeout(() => counterEl.classList.remove('bump'), 100);

      // Effects
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      updateStreak();
      playPhonkSound();
      spawnParticles(cx, cy);
      showClickText(cx, cy);
      showFlash();

      // Milestones
      const milestones = { 10: 'WARMING UP!', 25: 'GETTING HYPE!', 50: 'HALFWAY LIT!', 100: '100 HITS!', 250: 'BEAST MODE!', 500: 'LEGENDARY!', 1000: 'PHONK GOD!' };
      if (milestones[count]) {
        showMilestone(milestones[count]);
      }

      // Hue shift at milestones
      if (count % 100 === 0) {
        document.body.style.transition = 'background 0.5s';
        document.body.style.background = '#120008';
        setTimeout(() => { document.body.style.background = '#0a0a0a'; }, 500);
      }
    }

    btn.addEventListener('click', handleClick);
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleClick(e);
    }, { passive: false });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        btn.click();
      }
    });
  </script>
</body>
</html>
